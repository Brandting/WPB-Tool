<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1206, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b1320">
<meta name="apple-mobile-web-app-title" content="Begehung">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<title>Baustellenbegehung</title>
<style>
  :root {
    --primary:#0b1320; --primary-dark:#060d18;
    --bg:#f4f4f8; --card:#ffffff; --surface-2:#f7f5f7;
    --text:#1a1a1a; --muted:#6b6b6b; --border:#e0e0e0;
    --green:#0aaf60; --yellow:#f5a623; --red:#e53935; --blue:#0084d6;
    --radius:28px; --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
  }
  * { box-sizing:border-box; margin:0; padding:0; font-family:var(--font); -webkit-tap-highlight-color:transparent; }
  body { background:var(--bg); color:var(--text); height:100dvh; display:flex; flex-direction:column; font-size:28px; overscroll-behavior:none; overflow:hidden; }

  /* ── Header ── */
  header {
    background:var(--primary); color:#fff;
    padding: calc(44px + var(--safe-top)) 44px 72px 0;
    display:flex; align-items:flex-end; justify-content:space-between;
    flex-shrink:0;
    box-shadow:0 4px 16px rgba(11,19,32,.3);
  }
  header h1 { font-size:52px; font-weight:700; letter-spacing:-.5px; }

  /* ── Main ── */
  main { flex:1; padding:32px 32px calc(220px + var(--safe-bottom)); overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; }

  /* ── Cards ── */
  .card { background:var(--card); border-radius:var(--radius); border:1px solid var(--border); padding:36px; margin-bottom:20px; }
  .card-title { font-size:34px; font-weight:700; color:var(--primary); margin-bottom:20px; }
  .empty-state { text-align:center; padding:100px 48px; color:var(--muted); }
  .empty-state .ei { font-size:100px; display:block; margin-bottom:24px; }

  /* ── Begehung list card ── */
  .beg-card {
    background:var(--card); border-radius:var(--radius); border:1px solid var(--border);
    padding:40px 44px; margin-bottom:24px; cursor:pointer;
    display:flex; align-items:center; gap:24px;
  }
  .beg-card:active { background:var(--surface-2); }
  .beg-card-left { flex:1; min-width:0; }
  .beg-date { font-size:60px; font-weight:700; line-height:1.1; }
  .beg-meta { font-size:38px; color:var(--muted); margin-top:12px; line-height:1.3; }
  .beg-grund { font-size:38px; color:var(--text); margin-top:12px; line-height:1.3; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .beg-actions { display:flex; gap:16px; flex-shrink:0; }

  /* ── Buttons ── */
  .btn {
    background:var(--primary); color:#fff; border:none;
    padding:24px 40px; border-radius:999px; font-size:28px;
    font-weight:700; cursor:pointer; display:inline-flex; align-items:center; gap:12px;
    font-family:var(--font); transition:background .12s; min-height:90px;
  }
  .btn:active { background:var(--primary-dark); transform:scale(.97); }
  .btn-secondary { background:var(--card); color:var(--primary); border:3px solid var(--primary); }
  .btn-secondary:active { background:#fff0f7; }
  .btn-danger { background:var(--red); }
  .btn-danger:active { background:#b91c1c; }
  .btn-sm { padding:24px 38px; font-size:31px; min-height:94px; }
  .btn-icon { padding:0; font-size:38px; border-radius:50%; width:96px; height:96px; justify-content:center; flex-shrink:0; }

  /* ── FAB ── */
  .fab {
    position:fixed; bottom:calc(48px + var(--safe-bottom)); right:44px;
    background:var(--primary); color:#fff; border:none;
    border-radius:50%; width:160px; height:160px; font-size:80px;
    box-shadow:0 8px 32px rgba(11,19,32,.5);
    cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:40;
    transition:transform .12s;
  }
  .fab:active { transform:scale(.93); }
  .fab-export {
    position:fixed; bottom:calc(48px + var(--safe-bottom)); left:44px;
    background:var(--primary); color:#fff; border:none;
    border-radius:50%; width:160px; height:160px; font-size:80px;
    box-shadow:0 8px 32px rgba(11,19,32,.4);
    cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:40;
    transition:transform .12s;
  }
  .fab-export:active { transform:scale(.93); }

  /* ── Erkenntnisse ── */
  .erkenntnis-card {
    display:flex; flex-direction:row; align-items:stretch;
    min-height:180px; border:1px solid var(--border); border-radius:var(--radius);
    overflow:hidden; margin-bottom:24px; background:var(--card);
  }
  .erk-typ-col {
    width:88px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; padding:20px 0;
  }
  .erk-typ-badge-rot {
    writing-mode:vertical-lr; transform:rotate(180deg);
    padding:20px 12px; border-radius:16px;
    font-size:20px; font-weight:800; letter-spacing:1px; text-transform:uppercase; white-space:nowrap;
  }
  .erk-vdivider { width:1px; background:var(--border); flex-shrink:0; margin:16px 0; }
  .erk-img-col {
    width:220px; flex-shrink:0;
    margin:12px 10px; border-radius:16px; border:1px solid var(--border);
    background:var(--surface-2); position:relative; overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,.07);
  }
  .erk-img-col img {
    position:absolute; top:0; left:0; width:100%; height:100%;
    object-fit:contain; display:block;
  }
  .erk-no-photo {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    color:#aaa; font-size:32px; text-align:center;
  }
  .erk-text-col {
    flex:1; padding:24px 20px 24px 28px; min-width:0;
    font-size:36px; line-height:1.5; color:var(--text);
    overflow-y:auto; word-break:break-word;
  }
  .erk-actions-col {
    width:100px; flex-shrink:0;
    display:flex; flex-direction:column; align-items:stretch;
    border-left:1px solid var(--border); overflow:hidden;
  }
  .erk-actions-col button {
    flex:1; background:none; border:none; cursor:pointer; font-size:36px;
    display:flex; align-items:center; justify-content:center;
  }
  .erk-actions-col button:first-child { border-bottom:1px solid var(--border); }
  .erk-actions-col button:first-child:active { background:#f0f7ff; }
  .erk-actions-col button:last-child:active { background:#fee2e2; }
  /* Drag handle */
  .erk-drag-handle {
    width:104px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:32px; color:var(--muted); cursor:grab;
    border-right:1px solid var(--border);
    touch-action:none;
  }
  .erkenntnis-card.dragging {
    opacity:.5; border:2px dashed var(--primary);
  }
  .erkenntnis-card.drag-over {
    border-top:4px solid var(--primary);
  }

  /* ── Badges ── */
  .badge-mangel { background:#fee2e2; color:#991b1b; }
  .badge-info   { background:#dbeafe; color:#1e40af; }
  .badge-hinweis{ background:#fef9c3; color:#92400e; }

  /* ── Modal ── */
  .modal-bg {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.55);
    z-index:100; align-items:flex-end; justify-content:center; padding:0;
  }
  .modal-bg.show { display:flex; }
  .modal {
    background:var(--card); color:var(--text); border-radius:44px 44px 0 0;
    width:100%; max-height:99dvh; min-height:50dvh; overflow-y:auto;
    padding:40px 44px calc(40px + var(--safe-bottom));
    display:flex; flex-direction:column;
  }
  .modal h3 { color:var(--primary); margin-bottom:36px; font-size:40px; font-weight:700; }
  .form-group { margin-bottom:32px; }
  label { display:block; font-size:22px; font-weight:700; color:var(--muted); margin-bottom:10px; text-transform:uppercase; letter-spacing:.5px; }
  input, select, textarea {
    width:100%; padding:22px 28px; border:2px solid var(--border);
    border-radius:20px; font-size:32px; font-family:inherit;
    background:var(--card); color:var(--text); min-height:88px;
  }
  input:focus, select:focus, textarea:focus { outline:none; border-color:var(--primary); }
  .modal-actions { display:flex; gap:20px; margin-top:36px; }
  .modal-actions .btn { flex:1; justify-content:center; font-size:30px; min-height:100px; }
  .modal-handle {
    width:60px; height:6px; background:var(--border); border-radius:3px;
    margin:0 auto 36px; cursor:pointer;
  }

  /* ── Photo capture ── */
  .photo-capture-area {
    height:280px; border:3px dashed var(--border); border-radius:20px;
    background:var(--surface-2); cursor:pointer;
    display:flex; align-items:center; justify-content:center; overflow:hidden;
  }
  .photo-placeholder { text-align:center; color:var(--muted); font-size:28px; padding:20px; }
  .photo-placeholder .cam-icon { font-size:72px; display:block; margin-bottom:12px; }

  /* ── Detail header ── */
  .detail-header {
    display:flex; align-items:center; gap:24px; margin-bottom:36px;
  }
  .detail-header h2 { font-size:44px; font-weight:700; color:var(--primary); flex:1; margin:0; }

  /* ── Export banner ── */
</style>
</head>

<main id="main">
  <div class="empty-state"><span class="ei">⏳</span>Laden…</div>
</main>

<div class="modal-bg" id="modalBg">
  <div class="modal" id="modal">
    <div class="modal-handle" onclick="closeModal()"></div>
  </div>
</div>

<script>
'use strict';

// ── State ──
let state = {
  diary: [],
  settings: { saveOriginalPhoto: false },
};
let currentBegehungId = null;
let currentView = 'list';

// ── IndexedDB ──
const DB_NAME = 'bauleiter-field-db';
const DB_STORE = 'kv';
const KEYS = ['diary','settings'];
let _db = null;

function openDB(){
  if(_db) return Promise.resolve(_db);
  return new Promise((res,rej)=>{
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore(DB_STORE);
    req.onsuccess = e => { _db = e.target.result; res(_db); };
    req.onerror   = e => rej(e.target.error);
  });
}
async function dbGet(key){
  const db = await openDB();
  return new Promise((res,rej)=>{
    const tx = db.transaction(DB_STORE,'readonly');
    const req = tx.objectStore(DB_STORE).get(key);
    req.onsuccess = ()=>res(req.result);
    req.onerror   = ()=>rej(req.error);
  });
}
async function dbSet(key,val){
  const db = await openDB();
  return new Promise((res,rej)=>{
    const tx = db.transaction(DB_STORE,'readwrite');
    const req = tx.objectStore(DB_STORE).put(val,key);
    req.onsuccess = ()=>res();
    req.onerror   = ()=>rej(req.error);
  });
}
async function loadAll(){
  for(const k of KEYS){
    const v = await dbGet('field:'+k);
    if(v !== undefined) state[k] = v;
  }
}
async function save(key){
  await dbSet('field:'+key, state[key]);
}

// ── Utils ──
const uid  = ()=> Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const today= ()=> new Date().toISOString().slice(0,10);
const fmtDate = d => d ? new Date(d).toLocaleDateString('de-DE') : '';
const esc = s => String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

// ── Modal ──
function openModal(html){
  const m = document.getElementById('modal');
  m.innerHTML = '<div class="modal-handle" onclick="closeModal()"></div>' + html;
  document.getElementById('modalBg').classList.add('show');
  m.scrollTop = 0;
}
function closeModal(){
  document.getElementById('modalBg').classList.remove('show');
}
document.getElementById('modalBg').addEventListener('click', e => {
  if(e.target === document.getElementById('modalBg')) closeModal();
});

// ── Render ──
function render(){
  const m = document.getElementById('main');
  if(currentView==='detail' && currentBegehungId){
    m.innerHTML = renderDetail(currentBegehungId);
  } else {
    m.innerHTML = renderList();
  }
}

function renderList(){
  const begehungen = state.diary
    .filter(d => d.type==='begehung')
    .sort((a,b)=>b.date.localeCompare(a.date));


  return `

    ${begehungen.length===0 ? `
    <div class="empty-state">
      <span class="ei">📋</span>
      Noch keine Begehungen.<br>Unten + drücken.
    </div>` :
    begehungen.map(b=>`
      <div class="beg-card" onclick="openDetail('${b.id}')">
        <div class="beg-card-left">
          <div class="beg-date">${fmtDate(b.date)}</div>
          ${b.projektHinweis ? `<div class="beg-meta">📁 ${esc(b.projektHinweis)}</div>` : ''}
          ${b.workforce ? `<div class="beg-meta">👥 ${esc(b.workforce)}</div>` : ''}
          ${b.grund ? `<div class="beg-grund">📌 ${esc(b.grund)}</div>` : ''}
          <div class="beg-meta" style="margin-top:6px">🔍 ${(b.erkenntnisse||[]).length} Erkenntnisse</div>
        </div>
      </div>`
    ).join('')}
    <div style="height:200px"></div>
    <button class="fab" onclick="editBegehung()">+</button>
    <button class="fab-export" onclick="exportField()">📤</button>
  `;
}

function renderDetail(id){
  const b = state.diary.find(x=>x.id===id);
  if(!b) return '<div class="empty-state"><span class="ei">❓</span>Nicht gefunden</div>';
  const erkenntnisse = b.erkenntnisse||[];
  return `
    <div class="detail-header">
      <button class="btn btn-secondary btn-sm" onclick="currentView='list';render()">← Zurück</button>
      <h2>📋 ${fmtDate(b.date)}</h2>
      <button class="btn btn-secondary btn-sm" onclick="editBegehung('${id}')">✏️</button>
      <button class="btn btn-secondary btn-sm" onclick="printBegehung('${id}')">🖨️</button>
      <button class="btn btn-danger btn-sm" onclick="deleteBegehung('${id}')">🗑️</button>
    </div>
    <div class="card" style="margin-bottom:14px">
      ${b.projektHinweis?`<div style="font-size:38px;line-height:1.3"><strong>Projekt:</strong> ${esc(b.projektHinweis)}</div>`:''}
      ${b.workforce?`<div style="font-size:38px;line-height:1.3;margin-top:12px"><strong>Anwesende:</strong> ${esc(b.workforce)}</div>`:''}
      ${b.grund?`<div style="font-size:38px;line-height:1.3;margin-top:12px"><strong>Grund:</strong> ${esc(b.grund)}</div>`:''}
    </div>
    <div style="margin-bottom:20px;font-size:38px;font-weight:700">
      Erkenntnisse <span style="color:var(--muted);font-weight:400">(${erkenntnisse.length})</span>
      ${erkenntnisse.length>1?`<span style="font-size:24px;color:var(--muted);font-weight:400;margin-left:16px">☰ Lang drücken zum Sortieren</span>`:''}
    </div>
    ${erkenntnisse.length===0?`<div class="empty-state" style="padding:32px"><span class="ei">🔍</span>Noch keine – unten + drücken</div>`:''}
    <div id="erkList_${id}">
    ${erkenntnisse.map((e,i)=>{
      const cls = e.typ==='Mangel'?'mangel':e.typ==='Info'?'info':'hinweis';
      return `
      <div class="erkenntnis-card" data-idx="${i}" id="erk_${id}_${i}">
        <div class="erk-drag-handle" onpointerdown="erkDragStart(event,'${id}',${i})">☰</div>
        <div class="erk-typ-col">
          <span class="badge-${cls} erk-typ-badge-rot">${e.typ||'—'}</span>
        </div>
        <div class="erk-vdivider"></div>
        <div class="erk-img-col">
          ${e.foto?`<img src="${e.foto}" alt="Foto">`:`<div class="erk-no-photo">📷<br>Kein Foto</div>`}
        </div>
        <div class="erk-text-col">${esc(e.beschreibung||'').replace(/\n/g,'<br>')}</div>
        <div class="erk-actions-col">
          <button onclick="editErkenntnis('${id}',${i})">✏️</button>
          <button onclick="deleteErkenntnis('${id}',${i})">🗑️</button>
        </div>
      </div>`;
    }).join('')}
    </div>
    <div style="height:200px"></div>
    <button class="fab" onclick="addErkenntnis('${id}')">+</button>
  `;
}

// ── Projekt anlegen (entfernt) ──

// ── Begehung ──
function editBegehung(id){
  const b = id ? state.diary.find(x=>x.id===id) : {
    id:uid(), type:'begehung', date:today(), workforce:'', grund:'', erkenntnisse:[], projektHinweis:''
  };
  openModal(`
    <h3>${id?'Begehung bearbeiten':'Neue Begehung'}</h3>
    <div class="form-group"><label>Datum *</label>
      <input type="date" id="bDatum" value="${b.date}">
    </div>
    <div class="form-group">
      <label>Projekt <span style="font-weight:400;color:var(--muted);font-size:12px">(Gedankenstütze – wird beim Import im Hauptsystem zugeordnet)</span></label>
      <input id="bProjektHinweis" value="${esc(b.projektHinweis||'')}" placeholder="z.B. PV Aurich Süd …">
    </div>
    <div class="form-group"><label>Anwesende</label>

      <textarea id="bGrund" rows="3">${esc(b.grund||'')}</textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Abbrechen</button>
      <button class="btn" onclick="saveBegehung('${b.id}',${!!id})">Speichern</button>
    </div>
  `);
}
async function saveBegehung(id, exists){
  const date = document.getElementById('bDatum')?.value;
  const projektHinweis = document.getElementById('bProjektHinweis')?.value||'';
  const workforce = document.getElementById('bWorkforce')?.value||'';
  const grund = document.getElementById('bGrund')?.value||'';
  if(!date){ alert('Datum erforderlich'); return; }
  const existing = state.diary.find(x=>x.id===id);
  const data = { id, type:'begehung', date, projektHinweis, workforce, grund, erkenntnisse: existing?.erkenntnisse||[] };
  if(exists){ state.diary = state.diary.map(d=>d.id===id?{...d,...data}:d); }
  else { state.diary.push(data); }
  await save('diary');
  closeModal(); render();
}

}

function previewPhoto(eid){
  const input = document.getElementById('photoInput_'+eid);
  const area  = document.getElementById('photoArea_'+eid);
  if(!input||!area||!input.files[0]) return;
  compressPhoto(input.files[0]).then(dataUrl=>{
    area.innerHTML = `<img src="${dataUrl}" style="width:100%;height:100%;object-fit:contain;display:block">`;
    input._compressed = dataUrl;
  });
}

function compressPhoto(file){
  return new Promise(res=>{
    const reader = new FileReader();
    reader.onload = ev=>{
      const img = new Image();
      img.onload = ()=>{
        let w=img.width, h=img.height;
        const ratio = Math.min(1200/w, 1200/h, 1);
        w=Math.round(w*ratio); h=Math.round(h*ratio);
        const c=document.createElement('canvas');
        c.width=w; c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        res(c.toDataURL('image/jpeg',0.78));
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}


function saveOriginalToDevice(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const w = window.open('', '_blank');
    if(!w) return;
    w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
      <meta name="viewport" content="width=device-width">
      <title>Foto sichern</title>
      <style>body{margin:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px}
      img{max-width:100%;max-height:80vh;object-fit:contain}
      p{color:#fff;font-size:18px;text-align:center;padding:0 20px}
      button{background:#3b82f6;color:#fff;border:none;padding:16px 32px;font-size:18px;border-radius:12px;cursor:pointer}</style>
      </head><body>
      <p>📷 Tippe lange auf das Bild → „Zum Fotoalbum hinzufügen"</p>
      <img src="${ev.target.result}" alt="Foto">
      <button onclick="window.close()">✕ Schließen</button>
      </body></html>`);
    w.document.close();
  };
  reader.readAsDataURL(file);
}

async function saveErkenntnis(begehungId, eid){
  const input = document.getElementById('photoInput_'+eid);
  const desc  = document.getElementById('erkDesc_'+eid)?.value||'';
  const typ   = document.getElementById('erkTyp_'+eid)?.value||'Info';
  const b = state.diary.find(x=>x.id===begehungId);
  if(!b) return;
  const originalFile = input?.files[0]||null;
  const getFoto = async ()=>{
    if(input?._compressed) return input._compressed;
    if(originalFile) return await compressPhoto(originalFile);
    return '';
  };
  const foto = await getFoto();
  if(originalFile) saveOriginalToDevice(originalFile);
  b.erkenntnisse = [...(b.erkenntnisse||[]), { id:eid, typ, beschreibung:desc, foto }];
  state.diary = state.diary.map(d=>d.id===begehungId?b:d);
  await save('diary');
  closeModal(); render();
}

async function updateErkenntnis(begehungId, idx, eid, existing){
  const input = document.getElementById('photoInput_'+eid);
  const desc  = document.getElementById('erkDesc_'+eid)?.value||'';
  const typ   = document.getElementById('erkTyp_'+eid)?.value||'Info';
  const b = state.diary.find(x=>x.id===begehungId);
  if(!b) return;
  const originalFile = input?.files[0]||null;
  let foto = existing?.foto||'';
  if(input?._compressed) foto=input._compressed;
  else if(originalFile){ foto=await compressPhoto(originalFile); saveOriginalToDevice(originalFile); }
  b.erkenntnisse[idx] = { ...existing, typ, beschreibung:desc, foto };
  state.diary = state.diary.map(d=>d.id===begehungId?b:d);
  await save('diary');
  closeModal(); render();
}

async function deleteErkenntnis(begehungId, idx){
  if(!confirm('Erkenntnis löschen?')) return;
  const b = state.diary.find(x=>x.id===begehungId);
  if(!b) return;
  b.erkenntnisse = (b.erkenntnisse||[]).filter((_,i)=>i!==idx);
  state.diary = state.diary.map(d=>d.id===begehungId?b:d);
  await save('diary');
  render();
}

function printBegehung(id){
  const b = state.diary.find(x=>x.id===id);
  if(!b) return;
  const erkenntnisse = b.erkenntnisse||[];
  const esc2=s=>String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const fmtD=d=>d?new Date(d).toLocaleDateString('de-DE'):'';
  const typColor=t=>t==='Mangel'?'#dc2626':t==='Info'?'#3b82f6':'#d97706';
  const typBg=t=>t==='Mangel'?'#fee2e2':t==='Info'?'#dbeafe':'#fef9c3';
  const SLOTS=5, FIRST=4;
  let pages=[];
  let p1=[{type:'info'}];
  for(let i=0;i<FIRST&&i<erkenntnisse.length;i++) p1.push({type:'erk',e:erkenntnisse[i],idx:i});
  while(p1.length<SLOTS) p1.push({type:'empty'});
  pages.push(p1);
  for(let i=FIRST;i<erkenntnisse.length;i+=SLOTS){
    let pg=[];
    for(let j=0;j<SLOTS&&(i+j)<erkenntnisse.length;j++) pg.push({type:'erk',e:erkenntnisse[i+j],idx:i+j});
    while(pg.length<SLOTS) pg.push({type:'empty'});
    pages.push(pg);
  }
  const slotHtml=slot=>{
    if(slot.type==='empty') return `<div class="slot empty-slot"></div>`;
    if(slot.type==='info') return `<div class="slot info-slot"><div class="slot-inner"><div class="info-title">Begehungsprotokoll</div><table class="info-table"><tr><td class="info-label">Datum</td><td>${fmtD(b.date)}</td></tr>${b.projektHinweis?`<tr><td class="info-label">Projekt</td><td>${esc2(b.projektHinweis)}</td></tr>`:''} ${b.workforce?`<tr><td class="info-label">Anwesende</td><td>${esc2(b.workforce)}</td></tr>`:''} ${b.grund?`<tr><td class="info-label">Grund</td><td>${esc2(b.grund)}</td></tr>`:''}<tr><td class="info-label">Erkenntnisse</td><td>${erkenntnisse.length} gesamt</td></tr></table></div></div>`;
    const e=slot.e,nr=slot.idx+1;
    return `<div class="slot erk-slot"><div class="erk-slot-inner"><div class="p-typ-col"><span class="p-typ-badge" style="background:${typBg(e.typ)};color:${typColor(e.typ)}">${e.typ||'—'}</span></div><div class="p-vdiv"></div><div class="p-img-col">${e.foto?`<img src="${e.foto}" class="p-img">`:'<div class="p-no-photo">Kein Foto</div>'}</div><div class="p-desc-col">${esc2(e.beschreibung||'').replace(/\n/g,'<br>')}</div><div class="p-nr-col">#${nr}</div></div></div>`;
  };
  const html=`<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><title>Begehung ${fmtD(b.date)}</title><style>*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}@page{size:A4 portrait;margin:10mm}body{background:#fff;color:#111}#printBar{position:fixed;bottom:0;left:0;right:0;padding:16px 24px;background:#0b1320;display:flex;gap:12px;z-index:999}#printBar button{flex:1;padding:16px;font-size:18px;font-weight:700;border:none;border-radius:10px;cursor:pointer}#printBtn{background:#3b82f6;color:#fff}#closeBtn{background:#555;color:#fff}@media print{#printBar{display:none}}.print-page{width:190mm;height:277mm;display:flex;flex-direction:column;page-break-after:always;overflow:hidden}.print-page:last-child{page-break-after:auto}.page-header-bar{display:flex;justify-content:space-between;font-size:8pt;color:#555;border-bottom:1px solid #ccc;padding-bottom:3mm;margin-bottom:3mm;flex-shrink:0}.slots-grid{flex:1;display:flex;flex-direction:column;gap:3mm;overflow:hidden}.slot{flex:1;min-height:0;border:1px solid #ddd;border-radius:4px;overflow:hidden;display:flex}.empty-slot{background:#f8f8f8;border-style:dashed}.info-slot{background:#f0f4ff;border-color:#4f46e5}.slot-inner{flex:1;display:flex;flex-direction:column;padding:3mm 4mm}.info-title{font-size:12pt;font-weight:700;color:#4f46e5;margin-bottom:3mm}.info-table{width:100%;border-collapse:collapse;font-size:9pt}.info-table td{padding:1.5mm 2mm;vertical-align:top}.info-label{color:#555;width:28mm;font-weight:600}.erk-slot-inner{flex:1;display:flex;flex-direction:row;align-items:stretch;overflow:hidden}.p-typ-col{width:14mm;flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:2mm 0}.p-typ-badge{writing-mode:vertical-lr;transform:rotate(180deg);padding:2.5mm 2mm;border-radius:3px;font-size:7.5pt;font-weight:800;letter-spacing:.8px;text-transform:uppercase;white-space:nowrap}.p-vdiv{width:.3mm;background:#ddd;flex-shrink:0;margin:3mm 0}.p-img-col{width:46mm;flex-shrink:0;background:#f5f5f5;border-right:.3mm solid #e0e0e0;margin:2mm 2mm 2mm 0;border-radius:2mm;border:.3mm solid #ddd;display:flex;align-items:center;justify-content:center;overflow:hidden}.p-img{max-width:100%;max-height:100%;object-fit:contain;display:block}.p-no-photo{font-size:7pt;color:#aaa;text-align:center;padding:2mm}.p-desc-col{flex:1;padding:3mm;font-size:8pt;line-height:1.45;color:#222;overflow:hidden;word-break:break-word;border-right:.3mm solid #eee}.p-nr-col{width:8mm;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:7.5pt;color:#bbb;font-weight:700;writing-mode:vertical-lr}</style></head><body><div id="printBar"><button id="printBtn">🖨️ Drucken</button><button id="closeBtn" onclick="window.close()">✕ Schließen</button></div>${pagesHtml}</div></div>`).join('')}<script>
  document.getElementById('printBtn').onclick = ()=>{
    window.print();
    window.onafterprint = ()=>window.close();
  };
<\/script></body></html>`;
  const w=window.open('','_blank');
  w.document.write(html);
  w.document.close();
}

// ── Service Worker ──
// ── Drag & Drop Sortierung ──
let _drag = { begehungId:null, fromIdx:null, el:null, clone:null, startY:0, lastOverIdx:null };

function erkDragStart(e, begehungId, idx){
  e.preventDefault();
  const card = e.currentTarget.closest('.erkenntnis-card');
  if(!card) return;

  _drag.begehungId = begehungId;
  _drag.fromIdx    = idx;
  _drag.el         = card;
  _drag.startY     = e.clientY || (e.touches&&e.touches[0].clientY) || 0;

  card.classList.add('dragging');

  const onMove = ev => {
    const y = ev.clientY || (ev.touches&&ev.touches[0].clientY) || 0;
    const list = document.getElementById('erkList_'+begehungId);
    if(!list) return;
    const cards = [...list.querySelectorAll('.erkenntnis-card:not(.dragging)')];
    let overIdx = null;
    for(let i=0;i<cards.length;i++){
      const r = cards[i].getBoundingClientRect();
      if(y < r.top + r.height/2){ overIdx = parseInt(cards[i].dataset.idx); break; }
    }
    if(overIdx === null) overIdx = cards.length; // after last
    // Visual feedback
    cards.forEach(c => c.classList.remove('drag-over'));
    if(overIdx < cards.length) cards[overIdx > idx ? overIdx-1 : overIdx]?.classList.add('drag-over');
    _drag.lastOverIdx = overIdx;
  };

  const onEnd = async () => {
    document.removeEventListener('pointermove', onMove);
    document.removeEventListener('pointerup', onEnd);
    card.classList.remove('dragging');
    document.querySelectorAll('.drag-over').forEach(c=>c.classList.remove('drag-over'));

    if(_drag.lastOverIdx !== null && _drag.lastOverIdx !== _drag.fromIdx){
      const b = state.diary.find(x=>x.id===begehungId);
      if(b){
        const erks = [...(b.erkenntnisse||[])];
        const [moved] = erks.splice(_drag.fromIdx, 1);
        let toIdx = _drag.lastOverIdx > _drag.fromIdx ? _drag.lastOverIdx - 1 : _drag.lastOverIdx;
        toIdx = Math.max(0, Math.min(toIdx, erks.length));
        erks.splice(toIdx, 0, moved);
        b.erkenntnisse = erks;
        state.diary = state.diary.map(d=>d.id===begehungId?b:d);
        await save('diary');
        render();
      }
    }
    _drag = { begehungId:null, fromIdx:null, el:null, startY:0, lastOverIdx:null };
  };

  document.addEventListener('pointermove', onMove, { passive:true });
  document.addEventListener('pointerup', onEnd);
}

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./service-worker.js').catch(console.warn);
}

// Verhindert Pull-to-Refresh auf iOS
(function(){
  let startY = 0;
  document.addEventListener('touchstart', e => {
    startY = e.touches[0].clientY;
  }, { passive: true });
  document.addEventListener('touchmove', e => {
    const y = e.touches[0].clientY;
    const el = e.target.closest('[data-scroll]') || document.getElementById('main') || document.querySelector('.modal.show');
    const scrollable = el && el.scrollTop > 0;
    if(y > startY && !scrollable){
      e.preventDefault();
    }
  }, { passive: false });
})();
