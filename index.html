<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PV · BESS · WIND – BauLeiter</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e5007d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BauLeiter">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%23e5007d'/%3E%3Ctext x='50' y='68' font-size='58' text-anchor='middle' fill='white' font-family='system-ui' font-weight='bold'%3EBL%3C/text%3E%3C/svg%3E">
<style>
  :root, [data-theme="enercity"]{
    --bg:#fafafa; --card:#ffffff; --surface-2:#f7f5f7; --info-bg:#fff0f7; --warn-bg:#fff4ec;
    --primary:#e5007d; --primary-dark:#b8005f; --accent:#ff6b35;
    --text:#1a1a1a; --muted:#6b6b6b; --border:#ececec;
    --green:#0aaf60; --yellow:#f5a623; --red:#e53935; --blue:#0084d6;
    --header-bg:linear-gradient(135deg,#e5007d 0%,#ff3d8a 100%);
    --header-text:#ffffff; --nav-bg:#ffffff; --nav-active-bg:#fff0f7;
    --shadow:0 1px 3px rgba(229,0,125,.06);
    --radius:14px; --radius-btn:999px;
    --font:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;
  }
  [data-theme="hell"]{
    --bg:#f4f6f8; --card:#ffffff; --surface-2:#f8fafc; --info-bg:#f0f7ff; --warn-bg:#fff7ed;
    --primary:#1f4e79; --primary-dark:#16385a; --accent:#ff8800;
    --text:#1f2937; --muted:#6b7280; --border:#e5e7eb;
    --green:#16a34a; --yellow:#eab308; --red:#dc2626; --blue:#2563eb;
    --header-bg:#1f4e79; --header-text:#ffffff;
    --nav-bg:#ffffff; --nav-active-bg:#e8f0f8;
    --shadow:0 1px 3px rgba(0,0,0,.05);
    --radius:8px; --radius-btn:6px;
    --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  [data-theme="dark"]{
    --bg:#0f172a; --card:#1e293b; --surface-2:#172033; --info-bg:#1e2a44; --warn-bg:#2d2418;
    --primary:#60a5fa; --primary-dark:#3b82f6; --accent:#fbbf24;
    --text:#f1f5f9; --muted:#94a3b8; --border:#334155;
    --green:#22c55e; --yellow:#eab308; --red:#ef4444; --blue:#3b82f6;
    --header-bg:#0b1220; --header-text:#f1f5f9;
    --nav-bg:#1e293b; --nav-active-bg:#1e3a5f;
    --shadow:0 1px 3px rgba(0,0,0,.3);
    --radius:10px; --radius-btn:8px;
    --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:var(--font)}
  body{background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
  header{background:var(--header-bg);color:var(--header-text);padding:8px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 6px rgba(0,0,0,.1)}
  header h1{display:flex;align-items:center;margin:0}
  .project-select{background:rgba(255,255,255,.18);color:var(--header-text);border:1px solid rgba(255,255,255,.3);padding:8px 16px;border-radius:var(--radius-btn);font-size:14px;cursor:pointer}
  .project-select option{color:#000}
  .layout{display:flex;flex:1;min-height:0}
  nav{width:220px;background:var(--nav-bg);border-right:1px solid var(--border);padding:16px 0;flex-shrink:0;display:flex;flex-direction:column}
  nav button{display:flex;align-items:center;gap:12px;width:100%;background:none;border:none;padding:12px 20px;font-size:14px;color:var(--text);cursor:pointer;text-align:left;border-left:3px solid transparent;font-family:var(--font)}
  nav button:hover{background:var(--surface-2)}
  nav button.active{background:var(--nav-active-bg);border-left-color:var(--primary);color:var(--primary);font-weight:600}
  .nav-spacer{flex:1}
  .nav-bottom{border-top:1px solid var(--border);padding-top:8px;margin-top:8px}
  main{flex:1;padding:24px;overflow-y:auto;background:var(--bg)}
  .page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px}
  .page-header h2{font-size:24px;color:var(--primary);font-weight:600}
  .btn{background:var(--primary);color:#fff;border:none;padding:10px 20px;border-radius:var(--radius-btn);font-size:14px;cursor:pointer;font-weight:500;display:inline-flex;align-items:center;gap:6px;font-family:var(--font);transition:all .15s}
  .btn:hover{background:var(--primary-dark);transform:translateY(-1px)}
  .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
  .btn-secondary{background:var(--card);color:var(--primary);border:1px solid var(--primary)}
  .btn-secondary:hover{background:var(--info-bg)}
  .btn-danger{background:var(--red)}
  .btn-danger:hover{background:#b91c1c}
  .btn-sm{padding:6px 14px;font-size:12px}
  .grid{display:grid;gap:16px}
  .grid-stats{grid-template-columns:repeat(auto-fit,minmax(200px,1fr));margin-bottom:24px}
  .card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);border:1px solid var(--border)}
  .stat-card{text-align:center}
  .stat-card .num{font-size:36px;font-weight:700;color:var(--primary)}
  .stat-card .label{color:var(--muted);font-size:13px;text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
  .stat-card.green .num{color:var(--green)}
  .stat-card.yellow .num{color:var(--yellow)}
  .stat-card.red .num{color:var(--red)}
  table{width:100%;border-collapse:collapse;background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
  th{background:var(--surface-2);text-align:left;padding:12px;font-size:12px;text-transform:uppercase;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border)}
  td{padding:12px;border-bottom:1px solid var(--border);font-size:14px;vertical-align:top;color:var(--text)}
  tr:last-child td{border-bottom:none}
  tr:hover{background:var(--surface-2)}
  .badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;text-transform:uppercase}
  .badge.offen{background:#fee2e2;color:#991b1b}
  .badge.bearbeitung{background:#fef3c7;color:#92400e}
  .badge.erledigt{background:#dcfce7;color:#166534}
  .badge.hoch{background:#fee2e2;color:#991b1b}
  .badge.mittel{background:#fef3c7;color:#92400e}
  .badge.niedrig{background:#dbeafe;color:#1e40af}
  .badge.maengel{background:#fde2e2;color:#7f1d1d}
  .badge.aufgabe{background:#dbeafe;color:#1e3a8a}
  [data-theme="dark"] .badge.offen,[data-theme="dark"] .badge.hoch,[data-theme="dark"] .badge.maengel{background:#7f1d1d;color:#fecaca}
  [data-theme="dark"] .badge.bearbeitung,[data-theme="dark"] .badge.mittel{background:#78350f;color:#fde68a}
  [data-theme="dark"] .badge.erledigt{background:#14532d;color:#bbf7d0}
  [data-theme="dark"] .badge.niedrig,[data-theme="dark"] .badge.aufgabe{background:#1e3a8a;color:#bfdbfe}
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center;padding:20px}
  .modal-bg.show{display:flex}
  .modal{background:var(--card);color:var(--text);border-radius:var(--radius);max-width:960px;width:100%;max-height:90vh;overflow-y:auto;padding:28px;border:1px solid var(--border)}
  .modal h3{color:var(--primary);margin-bottom:18px;font-size:20px}
  .modal h4{color:var(--text)}
  .form-group{margin-bottom:14px}
  label{display:block;font-size:13px;color:var(--text);margin-bottom:5px;font-weight:500}
  input,select,textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-btn);font-size:14px;font-family:inherit;background:var(--card);color:var(--text)}
  [data-theme="dark"] input,[data-theme="dark"] select,[data-theme="dark"] textarea{background:var(--surface-2)}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(229,0,125,.1)}
  textarea{min-height:80px;resize:vertical}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
  .empty{text-align:center;padding:40px;color:var(--muted)}
  .empty-icon{font-size:48px;margin-bottom:10px;display:block}
  .filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .filters select,.filters input{flex:0 0 auto;width:auto;min-width:140px}
  .photo-thumb{width:50px;height:50px;border-radius:4px;object-fit:cover;border:1px solid var(--border)}
  .photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:6px;margin-top:8px}
  .photo-grid img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:4px}
  .loading{text-align:center;padding:60px;color:var(--muted)}
  .actions-cell{white-space:nowrap}
  .actions-cell button{margin-left:4px}
  /* Override hardcoded inline-bgs für Dark Mode */
  [data-theme="dark"] [style*="background:#f8fafc"],[data-theme="dark"] [style*="background:#fafbfc"]{background:var(--surface-2)!important}
  [data-theme="dark"] [style*="background:#f0f7ff"],[data-theme="dark"] [style*="background:#e8f0f8"]{background:var(--info-bg)!important;border-color:var(--border)!important}
  [data-theme="dark"] [style*="background:#fff7ed"],[data-theme="dark"] [style*="background:#fff0ed"]{background:var(--warn-bg)!important;border-color:var(--border)!important}
  [data-theme="dark"] [style*="color:var(--text)"]{color:var(--text)!important}
  /* Theme-Karten */
  .theme-card{padding:18px;border:2px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .2s;background:var(--card)}
  .theme-card:hover{border-color:var(--primary);transform:translateY(-2px)}
  .theme-card.selected{border-color:var(--primary);box-shadow:0 4px 12px rgba(229,0,125,.15)}
  .theme-preview{height:80px;border-radius:8px;margin-bottom:10px;display:flex;overflow:hidden}
  .theme-preview .pv-side{flex:0 0 30%;border-right:1px solid rgba(0,0,0,.1)}
  .theme-preview .pv-main{flex:1;padding:8px;display:flex;flex-direction:column;gap:4px}
  .theme-preview .pv-bar{height:8px;border-radius:4px}
  @media(max-width:768px){
    nav{width:60px}
    nav button span{display:none}
    main{padding:16px}
  }
  /* Gantt */
  .gantt-container{padding:0;overflow:hidden}
  .gantt-row{display:flex;align-items:stretch;border-bottom:1px solid var(--border);min-height:36px}
  .gantt-name{flex:0 0 240px;padding:8px 12px;font-size:13px;border-right:1px solid var(--border);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;flex-direction:column;justify-content:center}
  .gantt-bar-area{flex:1;position:relative;min-width:0}
  .gantt-bar{position:absolute;top:8px;height:20px;background:var(--primary);border-radius:3px;color:#fff;font-size:11px;padding:2px 6px;white-space:nowrap;overflow:hidden;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.15);z-index:2}
  .gantt-bar.milestone{background:var(--accent);width:18px!important;height:18px;border-radius:50%;text-align:center;padding:0;margin-left:-9px;margin-top:1px;box-shadow:0 0 0 2px var(--card)}
  .gantt-bar.done{background:var(--green)}
  .gantt-bar .progress{position:absolute;top:0;left:0;height:100%;background:rgba(255,255,255,.3);border-radius:3px}
  .gantt-week-line{position:absolute;top:0;bottom:0;width:1px;background:var(--border);pointer-events:none;z-index:1}
  .gantt-today-line{position:absolute;top:0;bottom:0;width:2px;background:var(--red);pointer-events:none;z-index:3;opacity:.6}
  .gantt-header{display:flex;background:var(--surface-2);border-bottom:2px solid var(--border);font-weight:600;color:var(--muted);position:sticky;top:0;z-index:5}
  .gantt-header-name{flex:0 0 240px;padding:0 12px;border-right:1px solid var(--border);display:flex;align-items:center;font-size:12px;text-transform:uppercase;letter-spacing:.5px}
  .gantt-header-dates{flex:1;display:flex;flex-direction:column;position:relative;min-width:0}
  .gantt-month-row{position:relative;height:26px;border-bottom:1px solid var(--border)}
  .gantt-week-row{position:relative;height:22px}
  .gantt-month-cell{position:absolute;top:0;height:100%;display:flex;align-items:center;justify-content:center;border-right:1px solid var(--border);overflow:hidden;white-space:nowrap;font-size:11px;font-weight:700;color:var(--text);padding:0 4px;text-transform:capitalize}
  .gantt-week-cell{position:absolute;top:0;height:100%;display:flex;align-items:center;justify-content:center;border-right:1px solid var(--border);overflow:hidden;white-space:nowrap;font-size:9px;color:var(--muted);font-weight:500}
  .checklist-item{display:flex;align-items:center;gap:8px;padding:6px;border-bottom:1px solid var(--border)}
  .checklist-item input[type=checkbox]{width:auto;margin:0}
  .checklist-item.done span{text-decoration:line-through;color:var(--muted)}
  .level-1{padding-left:0}
  .level-2{padding-left:20px}
  .level-3{padding-left:40px}
  .level-4{padding-left:60px}

  /* ===== BAUTAGEBUCH MOBILE ===== */
  @media (max-width: 768px) {
    nav { width: 52px; }
    nav button span { display: none; }
    nav button { padding: 14px 0; justify-content: center; font-size: 20px; }
    main { padding: 12px; }
    header { padding: 6px 12px; }
    .project-select { font-size: 16px; padding: 10px 14px; }
    .diary-mobile-header { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
    .diary-mobile-header h2 { font-size: 22px; }
    .diary-mobile-header .btn { font-size: 16px; padding: 12px 20px; border-radius: 12px; width: 100%; justify-content: center; }
    .diary-card-mobile { border-radius: 14px; padding: 18px; margin-bottom: 14px; }
    .diary-card-mobile .diary-date { font-size: 18px; font-weight: 700; }
    .diary-card-mobile .diary-meta { font-size: 15px; color: var(--muted); margin-top: 4px; }
    .diary-card-mobile .diary-actions { margin-top: 12px; display: flex; gap: 8px; }
    .diary-card-mobile .btn-sm { font-size: 14px; padding: 9px 16px; }
    .diary-card-mobile .diary-type-badge { display: inline-block; padding: 3px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; margin-left: 8px; }
    .begehung-detail-fab { position: fixed; bottom: 24px; right: 24px; z-index: 50; background: var(--primary); color: #fff; border: none; border-radius: 50%; width: 60px; height: 60px; font-size: 28px; box-shadow: 0 4px 16px rgba(0,0,0,.25); cursor: pointer; display: flex; align-items: center; justify-content: center; }
  }
  @media (min-width: 769px) {
    .diary-mobile-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 10px; }
    .diary-mobile-header h2 { font-size: 24px; color: var(--primary); font-weight: 600; }
    .diary-card-mobile { border-radius: var(--radius); padding: 20px; margin-bottom: 12px; }
    .diary-card-mobile .diary-date { font-size: 16px; font-weight: 700; }
    .diary-card-mobile .diary-meta { font-size: 14px; color: var(--muted); }
    .diary-card-mobile .diary-actions { display: flex; gap: 6px; }
    .diary-card-mobile .diary-type-badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; margin-left: 8px; }
    .begehung-detail-fab { position: fixed; bottom: 28px; right: 28px; z-index: 50; background: var(--primary); color: #fff; border: none; border-radius: 50%; width: 56px; height: 56px; font-size: 26px; box-shadow: 0 4px 16px rgba(0,0,0,.2); cursor: pointer; display: flex; align-items: center; justify-content: center; }
  }
  .badge-begehung { background: #dbeafe; color: #1e40af; }
  .badge-eintrag { background: #dcfce7; color: #166534; }
  [data-theme="dark"] .badge-begehung { background: #1e3a8a; color: #bfdbfe; }
  [data-theme="dark"] .badge-eintrag { background: #14532d; color: #bbf7d0; }
  .erkenntnis-card {
    display:flex; flex-direction:row; align-items:stretch;
    min-height:130px; border:1px solid var(--border); border-radius:var(--radius);
    overflow:hidden; margin-bottom:10px; background:var(--card);
  }
  /* Linke Typ-Spalte */
  .erk-typ-col {
    width:46px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    padding:10px 0;
  }
  .erk-typ-badge-rot {
    writing-mode:vertical-lr; transform:rotate(180deg);
    padding:10px 7px; border-radius:8px;
    font-size:11px; font-weight:800; letter-spacing:1px; text-transform:uppercase; white-space:nowrap;
  }
  /* Trennlinie */
  .erk-vdivider { width:1px; background:var(--border); flex-shrink:0; margin:10px 0; }
  /* Bild-Spalte – gerahmtes Thumbnail wie ein Button */
  .erk-img-col {
    width:118px; flex-shrink:0;
    margin:8px 8px 8px 6px;
    border-radius:10px; border:1px solid var(--border);
    background:var(--surface-2);
    position:relative; overflow:hidden;
    box-shadow:0 1px 3px rgba(0,0,0,.07);
  }
  .erk-img-col img {
    position:absolute; top:0; left:0; width:100%; height:100%;
    object-fit:contain; display:block;
  }
  .erk-no-photo {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    color:#aaa; font-size:11px; text-align:center;
  }
  /* Text-Spalte */
  .erk-text-col {
    flex:1; padding:10px 12px 10px 16px; min-width:0;
    font-size:14px; line-height:1.5; color:var(--text);
    overflow-y:auto; word-break:break-word;
  }
  /* Aktions-Spalte */
  .erk-actions-col {
    width:48px; flex-shrink:0;
    display:flex; flex-direction:column; align-items:stretch;
    border-left:1px solid var(--border); overflow:hidden;
  }
  .erk-actions-col .btn { padding:9px; font-size:17px; min-width:36px; height:36px; justify-content:center; }
  .badge-mangel { background:#fee2e2; color:#991b1b; }
  .badge-info { background:#dbeafe; color:#1e40af; }
  .badge-hinweis { background:#fef9c3; color:#92400e; }
  [data-theme="dark"] .badge-mangel { background:#7f1d1d; color:#fecaca; }
  [data-theme="dark"] .badge-info { background:#1e3a8a; color:#bfdbfe; }
  [data-theme="dark"] .badge-hinweis { background:#78350f; color:#fde68a; }
  .photo-capture-area { width: 100%; min-height: 180px; background: var(--surface-2); border: 2px dashed var(--border); border-radius: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; margin-bottom: 12px; }
  .photo-capture-area img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; }
  .photo-capture-area .photo-placeholder { color: var(--muted); font-size: 14px; text-align: center; padding: 20px; }
  .photo-capture-area .photo-placeholder .cam-icon { font-size: 40px; display: block; margin-bottom: 6px; }
</style>
</head>

  commDate:'Inbetriebnahme',gridDate:'Netzanschluss',acceptanceDate:'Abnahme',

function computeWorkflowAlerts(p, daysAhead=60){
  if(!p.type||!WORKFLOW_RULES[p.type]) return [];
  const tl=p.timeline||{};
  const now=new Date(); now.setHours(0,0,0,0);
  const alerts=[];
  for(const rule of WORKFLOW_RULES[p.type]){
    const dateStr=tl[rule.field];
    if(!dateStr) continue;
    const target=new Date(dateStr);
    const triggerDate=new Date(target.getTime()-rule.days*864e5);
    const daysUntilTrigger=Math.ceil((triggerDate-now)/864e5);
    const daysUntilEvent=Math.ceil((target-now)/864e5);
    if(daysUntilTrigger<=daysAhead){
      alerts.push({
        text:rule.text, field:rule.field,
        fieldLabel:TL_FIELD_LABEL[rule.field]||rule.field,
        eventDate:dateStr, daysUntilTrigger, daysUntilEvent,
        urgent:daysUntilTrigger<=0,
        done:daysUntilEvent<0,
      });
    }
  }
  return alerts.sort((a,b)=>a.daysUntilTrigger-b.daysUntilTrigger);
}

function docCompletionPct(p){
  const docs=p.docChecklist||[];
  if(!docs.length) return 0;
  const done=docs.filter(d=>d.status==='freigegeben'||d.status==='geprueft').length;
  return Math.round(done/docs.length*100);
}

function projAmpel(p){
  // Dokumente
  const docPct=docCompletionPct(p);
  const docColor=docPct>=80?'var(--green)':docPct>=50?'var(--yellow)':'var(--red)';
  // Zeit
  const now=new Date(); now.setHours(0,0,0,0);
  const tl=p.timeline||{};
  let zeitColor='var(--muted)'; let zeitLabel='—';
  if(tl.buildEnd){
    const days=Math.ceil((new Date(tl.buildEnd)-now)/864e5);
    zeitLabel=days<0?`${Math.abs(days)}T überfällig`:days+'T';
    zeitColor=days<0?'var(--red)':days<14?'var(--yellow)':'var(--green)';
  }
  // Schätzung
  const ests=state.estimates.filter(e=>e.projectId===p.id);
  const budget=ests.length?fmtEur(Math.max(...ests.map(e=>estTotal(e)))):'—';
  return {docPct,docColor,zeitColor,zeitLabel,budget};
}


const STORAGE_PREFIX = 'bauleiter:';
const STORAGE_KEYS = ['projects','contacts','tasks','diary','protocols','priceItems','calculations','estimates','pruefungen','schedule','settings','currentProject'];
const DB_NAME = 'bauleiter-db';
const DB_STORE = 'kv';
const DB_VERSION = 1;

// ---- IndexedDB Wrapper ----
let _db = null;
function openDB(){
  if(_db) return Promise.resolve(_db);
  return new Promise((resolve, reject)=>{
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => e.target.result.createObjectStore(DB_STORE);
    req.onsuccess = e => { _db = e.target.result; resolve(_db); };
    req.onerror   = e => reject(e.target.error);
  });
}
async function dbGet(key){
  const db = await openDB();
  return new Promise((resolve, reject)=>{
    const tx = db.transaction(DB_STORE,'readonly');
    const req = tx.objectStore(DB_STORE).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror   = () => reject(req.error);
  });
}
async function dbSet(key, value){
  const db = await openDB();
  return new Promise((resolve, reject)=>{
    const tx = db.transaction(DB_STORE,'readwrite');
    const req = tx.objectStore(DB_STORE).put(value, key);
    req.onsuccess = () => resolve();
    req.onerror   = () => reject(req.error);
  });
}
async function dbDel(key){
  const db = await openDB();
  return new Promise((resolve, reject)=>{
    const tx = db.transaction(DB_STORE,'readwrite');
    const req = tx.objectStore(DB_STORE).delete(key);
    req.onsuccess = () => resolve();
    req.onerror   = () => reject(req.error);
  });
}

// ---- Einmalige Migration von localStorage → IndexedDB ----
async function migrateFromLocalStorage(){
  const migrated = await dbGet('__migrated__');
  if(migrated) return;
  let found = false;
  for(const k of STORAGE_KEYS){
    const raw = localStorage.getItem(STORAGE_PREFIX+k);
    if(raw === null) continue;
    try{
      await dbSet(STORAGE_PREFIX+k, JSON.parse(raw));
      found = true;
    }catch(e){ console.warn('Migration fehlgeschlagen für '+k, e); }
  }
  await dbSet('__migrated__', true);
  if(found){
    console.log('✓ Daten von localStorage nach IndexedDB migriert');
    // localStorage aufräumen (optional)
    for(const k of STORAGE_KEYS) localStorage.removeItem(STORAGE_PREFIX+k);
  }
}

// ---- loadAll / save (API unverändert für den Rest des Codes) ----
async function loadAll(){
  try{
    await migrateFromLocalStorage();
    for(const k of STORAGE_KEYS){
      const val = await dbGet(STORAGE_PREFIX+k);
      if(val !== undefined) state[k] = val;
    }
  }catch(e){
    console.warn('IndexedDB nicht verfügbar', e);
    alert('Achtung: Lokaler Speicher nicht verfügbar. Daten werden beim Schließen verloren gehen.');
  }
}

async function save(key){
  try{
    await dbSet(STORAGE_PREFIX+key, state[key]);
  }catch(e){
    console.error('Speichern fehlgeschlagen für '+key, e);
    if(e.name === 'QuotaExceededError'){
      alert('Speicher voll! Bitte alte Fotos oder nicht benötigte Daten löschen.');
    }
  }
}

          <tr><td style="color:var(--muted);padding:4px 8px 4px 0;border:none">Laufzeit</td><td style="border:none;padding:4px 0">${p.start?fmtDate(p.start):'—'} → ${p.end?fmtDate(p.end):'—'}</td></tr>
          ${p.description?`<tr><td style="color:var(--muted);padding:4px 8px 4px 0;border:none;vertical-align:top">Beschreibung</td><td style="border:none;padding:4px 0">${esc(p.description)}</td></tr>`:''}
        </table>
      </div>

      <!-- Verknüpfte Schätzungen -->
      <div class="card">
        <h3 style="color:var(--primary);font-size:15px;margin-bottom:12px">💰 Kostenschätzungen
          <span style="color:${estimates.length?'var(--green)':'var(--muted)'};font-size:12px;margin-left:6px">${estimates.length?'✅ '+estimates.length+' vorhanden':'⬜ keine'}</span>
        </h3>
        ${estimates.length===0?'<div style="color:var(--muted);font-size:13px">Noch keine Kostenschätzung für dieses Projekt.</div>':
        estimates.map(e=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)">
          <div>
            <strong style="font-size:13px">${esc(e.name)}</strong>
            <span class="badge aufgabe" style="margin-left:6px;font-size:10px">${esc(EST_TEMPLATES[e.type]?.label||e.type)}</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <strong style="color:var(--primary)">${fmtEur(estTotal(e))}</strong>
            <button class="btn btn-sm btn-secondary" onclick="showView('schaetzung');setTimeout(()=>{currentEstimateId='${e.id}';render()},50)">Öffnen</button>
          </div>
        </div>`).join('')}
        <div style="margin-top:10px">
          <button class="btn btn-sm btn-secondary" onclick="showView('schaetzung');setTimeout(()=>newEstimate(),50)">+ Neue Schätzung</button>
        </div>
      </div>
    </div>

    <!-- Projektkennwerte -->
    <div class="card" style="margin-bottom:16px">
      <h3 style="color:var(--primary);font-size:15px;margin-bottom:14px">📐 Projektkennwerte
        ${tpl&&Object.keys(params).length>0?'<span style="color:var(--green);font-size:12px;margin-left:6px">✅</span>':'<span style="color:var(--muted);font-size:12px;margin-left:6px">⬜ unvollständig</span>'}
      </h3>
      <form onsubmit="saveProjektKennwerte(event,'${p.id}')">
        <div class="form-group">
          <label>Projekttyp</label>
          <select name="type" id="detailProjType" onchange="updateDetailKennwerte(this.value)">
            <option value="">— kein Typ —</option>
            ${Object.entries(EST_TEMPLATES).map(([k,t])=>`<option value="${k}" ${p.type===k?'selected':''}>${esc(t.label)}</option>`).join('')}
          </select>
        </div>
        <div id="detailKennwerteFields">
          ${tpl?`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px">
            ${tpl.params.filter(pr=>pr.primary).map(pr=>`<div>
              <label style="font-size:11px;color:var(--muted)">${esc(pr.label)}</label>
              <div style="display:flex;align-items:center;gap:4px;margin-top:3px">
                <input type="number" step="any" name="param_${pr.key}" value="${params[pr.key]??pr.default}" style="flex:1;font-size:13px">
                <span style="font-size:11px;color:var(--muted)">${esc(pr.unit)}</span>
              </div>
            </div>`).join('')}
          </div>${autoVals}`:'<p style="color:var(--muted);font-size:13px">Bitte zuerst einen Projekttyp wählen.</p>'}
        </div>
        <div style="margin-top:12px">
          <button type="submit" class="btn">💾 Kennwerte speichern</button>
        </div>
      </form>
    </div>

    <!-- Bauzeit & Meilensteine -->
    <div class="card">
      <h3 style="color:var(--primary);font-size:15px;margin-bottom:14px">📅 Bauzeit & Meilensteine
        ${tl.buildStart||tl.commDate?'<span style="color:var(--green);font-size:12px;margin-left:6px">✅</span>':'<span style="color:var(--muted);font-size:12px;margin-left:6px">⬜ unvollständig</span>'}
      </h3>
      <form onsubmit="saveProjektTimeline(event,'${p.id}')">
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px">
          <div>
            <label style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;display:block">📋 Planungsphase</label>
            <div style="display:flex;gap:6px;align-items:center">
              <input type="date" name="planStart" value="${tl.planStart||''}" style="flex:1">
              <span style="color:var(--muted);font-size:12px">bis</span>
              <input type="date" name="planEnd" value="${tl.planEnd||''}" style="flex:1">
            </div>
          </div>
          <div>
            <label style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;display:block">📄 Genehmigungsphase</label>
            <div style="display:flex;gap:6px;align-items:center">
              <input type="date" name="permitStart" value="${tl.permitStart||''}" style="flex:1">
              <span style="color:var(--muted);font-size:12px">bis</span>
              <input type="date" name="permitEnd" value="${tl.permitEnd||''}" style="flex:1">
            </div>
          </div>
          <div>
            <label style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;display:block">🏗️ Bauphase</label>
            <div style="display:flex;gap:6px;align-items:center">
              <input type="date" name="buildStart" value="${tl.buildStart||''}" style="flex:1">
              <span style="color:var(--muted);font-size:12px">bis</span>
              <input type="date" name="buildEnd" value="${tl.buildEnd||''}" style="flex:1">
            </div>
          </div>
          <div>
            <label style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;display:block">⚡ Inbetriebnahme</label>
            <input type="date" name="commDate" value="${tl.commDate||''}" style="width:100%">
          </div>
          <div>
            <label style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;display:block">🔌 Netzanschluss</label>
            <input type="date" name="gridDate" value="${tl.gridDate||''}" style="width:100%">
          </div>
          <div>
            <label style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;display:block">🔧 Abnahme / FAT / SAT</label>
            <input type="date" name="acceptanceDate" value="${tl.acceptanceDate||''}" style="width:100%">
          </div>
        </div>
        <div class="form-group" style="margin-top:12px">
          <label>Bemerkungen zur Bauzeit</label>
          <textarea name="notes" style="min-height:60px">${esc(tl.notes||'')}</textarea>
        </div>
        <button type="submit" class="btn">💾 Bauzeit speichern</button>
      </form>
    </div>

    <!-- Dokumenten-Checkliste -->
    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <h3 style="color:var(--primary);font-size:15px;margin:0">📋 Dokumenten-Checkliste
          ${(p.docChecklist||[]).length>0?`<span style="color:var(--muted);font-size:12px;font-weight:400;margin-left:8px">${docCompletionPct(p)}% freigegeben/geprüft</span>`:''}
        </h3>
        <button class="btn btn-sm btn-secondary" onclick="addCustomDoc('${p.id}')">+ Dokument</button>
      </div>
      ${!(p.type)?'<p style="color:var(--muted);font-size:13px">Bitte zuerst Projekttyp in Kennwerten setzen, um die Checkliste zu initialisieren.</p>':
      (p.docChecklist||[]).length===0?`<div style="display:flex;gap:10px;align-items:center"><p style="color:var(--muted);font-size:13px;margin:0">Checkliste noch nicht initialisiert.</p>
        <button class="btn btn-sm" onclick="initDocChecklist('${p.id}')">Checkliste erstellen</button></div>`:
      (() => {
        const docs = p.docChecklist||[];
        const cats = [...new Set(docs.map(d=>d.category))];
        const statusCount = {};
        DOC_STATUS.forEach(s=>{statusCount[s.key]=docs.filter(d=>d.status===s.key).length;});
        return `
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">
          ${DOC_STATUS.map(s=>statusCount[s.key]>0?`<span style="background:${s.color};color:#fff;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:600">${s.label}: ${statusCount[s.key]}</span>`:'').join('')}
        </div>
        ${cats.map(cat=>`
          <div style="margin-bottom:12px">
            <div style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--muted);letter-spacing:.5px;margin-bottom:6px">${esc(cat)}</div>
            ${docs.filter(d=>d.category===cat).map(doc=>`
              <div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)">
                <span style="flex:1;font-size:13px">${esc(doc.name)}${doc.custom?'<span style="color:var(--accent);font-size:10px;margin-left:6px">✎ eigene</span>':''}</span>
                <select style="width:130px;font-size:12px;padding:4px 6px" onchange="setDocStatus('${p.id}','${doc.id}',this.value)">
                  ${DOC_STATUS.map(s=>`<option value="${s.key}" ${doc.status===s.key?'selected':''}>${s.label}</option>`).join('')}
                </select>
                ${doc.custom?`<button class="btn btn-sm btn-danger" style="padding:3px 8px" onclick="removeCustomDoc('${p.id}','${doc.id}')">×</button>`:'<div style="width:32px"></div>'}
              </div>`).join('')}
          </div>`).join('')}`;
      })()}
    </div>

    <!-- Proaktive Workflow-Hinweise -->
    ${(()=>{
      const alerts=computeWorkflowAlerts(p,90).filter(a=>!a.done);
      if(!alerts.length) return '';
      return `<div class="card">
        <h3 style="color:var(--primary);font-size:15px;margin-bottom:12px">⚡ Proaktive Hinweise</h3>
        <table><thead><tr><th>Hinweis</th><th>Bezug</th><th style="text-align:right">Termin in</th></tr></thead><tbody>
        ${alerts.map(a=>`<tr style="${a.urgent?'background:var(--warn-bg)':''}">
          <td>${esc(a.text)}</td>
          <td style="font-size:12px;color:var(--muted)">${esc(a.fieldLabel)}: ${fmtDate(a.eventDate)}</td>
          <td style="text-align:right;font-weight:600;color:${a.urgent?'var(--red)':a.daysUntilTrigger<14?'var(--accent)':'var(--text)'}">
            ${a.urgent?'Jetzt!':a.daysUntilTrigger+'T'}
          </td>
        </tr>`).join('')}
        </tbody></table>
      </div>`;
    })()}

    <!-- BZP Schnellgenerator -->
    <div class="card">
      <h3 style="color:var(--primary);font-size:15px;margin-bottom:6px">📅 Bauzeitplan-Generator</h3>
      <p style="font-size:13px;color:var(--muted);margin-bottom:16px">
        Generiert einen Muster-Bauzeitplan aus den Projektkennwerten. Aktiviere nur die Gewerke die in deinem Projekt vorkommen — Dauern werden aus Kennwerten + Kolonnen berechnet.
        ${!p.type?'<br><strong style="color:var(--accent)">⚠ Bitte zuerst Projekttyp und Kennwerte setzen.</strong>':
        (!p.params||!Object.keys(p.params).length)?'<br><strong style="color:var(--accent)">⚠ Bitte Kennwerte ausfüllen.</strong>':''}
      </p>
      ${p.type&&p.params&&Object.keys(p.params).length?renderBzpGenerator(p):''}
    </div>
  `;
}

// ============ BZP GENERATOR ============
// Tagesleistungen (m/Tag oder Stk/Tag je Kolonne)
const BZP_PERF = {
  trench_open:    160,  // m/Tag offene Bauweise (1 Kolonne)
  trench_hdd:     30,   // m/Tag HDD-Querung (1 Gerät)
  road:           80,   // m/Tag Wegebau (1 Kolonne)
  road_main:      50,   // m/Tag Hauptbaustraße (1 Kolonne)
  fence:          200,  // m/Tag Zaunmontage (1 Kolonne)
  pv_modules:     400,  // Stk/Tag Montage (1 Kolonne)
  pv_string:      2000, // m/Tag DC-Stringverkabelung (1 Kolonne)
  mv_cable:       200,  // m/Tag MV-Kabelverlegung (1 Kolonne)
  foundation_ram: 80,   // Stk/Tag Rammpfähle (1 Gerät)
  bess_found:     2,    // Stk/Tag Betonfundamente Container (1 Kolonne)
  bess_container: 1,    // Stk/Tag Container setzen (1 Kran)
  wea_found:      0.5,  // Stk/Tag Fundamentherstellung WEA (1 Kolonne)
  wea_erect:      0.5,  // Stk/Tag WEA-Errichtung (1 Kran)
};

// Template-Definition: Gruppen mit Vorgängen
// each item: {id, label, unit, perfKey, quantityFn, level, depIds, optional, defaultActive}
const BZP_TEMPLATES = {
  pv: {
    kolonnen: [
      {key:'kol_tiefbau',  label:'Tiefbau-Kolonnen',    default:1},
      {key:'kol_zaun',     label:'Zaun-Kolonnen',        default:1},
      {key:'kol_montage',  label:'Montage-Kolonnen',     default:2},
      {key:'kol_kabel',    label:'Kabel-Kolonnen (DC)',  default:1},
      {key:'kol_mv',       label:'MV-Kabel-Kolonne',     default:1},
      {key:'ger_ramm',     label:'Rammgeräte',            default:1},
    ],
    toggles: [
      {key:'t_baustr',  label:'Hauptbaustraße bauen',      default:true},
      {key:'t_infield', label:'Infield-Wegebau',           default:true},
      {key:'t_hdd',     label:'HDD-Querungen',             default:false},
      {key:'t_zaun',    label:'Zaunanlage',                default:true},
      {key:'t_ramm',    label:'Rammpfähle (Aufständerung)',default:true},
      {key:'t_dc',      label:'DC-Stringverkabelung',      default:true},
      {key:'t_mv',      label:'MV-Kabeltrasse',            default:true},
      {key:'t_station', label:'MS-Station(en)',            default:true},
      {key:'t_montage', label:'Modulmontage',              default:true},
      {key:'t_com',     label:'Commissioning',             default:true},
    ],
    tasks: (p,kol,tog)=>{
      const params=p.params||{};
      const trM=params.trenchM||0, roadM=params.roadM||0, fenceM=params.fenceM||0;
      const mwp=params.mwp||1, mods=params.moduleCount||Math.round(mwp*1800);
      const mvSt=params.mvStations||2;
      const hddM=Math.round(trM*0.15); // Annahme 15% HDD
      const tasks=[];
      let lastId=null;
      const add=(id,name,days,level,dep,optional,togKey)=>{
        if(optional&&!tog[togKey]) return;
        tasks.push({id,name,duration:Math.max(1,Math.round(days)),level,depId:dep});
        lastId=id;
      };
      add('bzp_baustr','Baustraße / Zufahrt',roadM*0.3/BZP_PERF.road_main/kol.kol_tiefbau,1,null,true,'t_baustr');
      add('bzp_einricht','Baustelleneinrichtung',3,1,null,false,null);
      const afterSetup=tog.t_baustr?'bzp_baustr':'bzp_einricht';
      add('bzp_ramm','Rammpfähle setzen',mods*0.55/BZP_PERF.foundation_ram/kol.ger_ramm,1,afterSetup,true,'t_ramm');
      add('bzp_zaun','Zaunanlage',fenceM/BZP_PERF.fence/kol.kol_zaun,1,afterSetup,true,'t_zaun');
      add('bzp_infield','Infield-Wegebau',roadM/BZP_PERF.road/kol.kol_tiefbau,1,afterSetup,true,'t_infield');
      const afterPara=tasks.length?tasks[tasks.length-1].id:afterSetup;
      add('bzp_mv','Kabeltrasse MV (offen)',(trM-(tog.t_hdd?hddM:0))/BZP_PERF.mv_cable/kol.kol_mv,1,afterSetup,true,'t_mv');
      add('bzp_hdd','HDD-Querungen',hddM/BZP_PERF.trench_hdd/1,2,'bzp_mv',true,'t_hdd');
      add('bzp_mvcable','MV-Kabelzug',trM/BZP_PERF.mv_cable/kol.kol_mv,2,tog.t_hdd?'bzp_hdd':'bzp_mv',true,'t_mv');
      add('bzp_station','MS-Station(en) setzen',mvSt*5,1,'bzp_mvcable',true,'t_station');
      add('bzp_montage','Modulaufständerung & -montage',mods/BZP_PERF.pv_modules/kol.kol_montage,1,tog.t_ramm?'bzp_ramm':afterSetup,true,'t_montage');
      add('bzp_dc','DC-Stringverkabelung',mods*2/BZP_PERF.pv_string/kol.kol_kabel,1,'bzp_montage',true,'t_dc');
      add('bzp_com','Commissioning & IBN',Math.max(5,Math.round(mwp*2)),1,tog.t_station?'bzp_station':'bzp_dc',true,'t_com');
      return tasks;
    }
  },
  bess: {
    kolonnen: [
      {key:'kol_tiefbau',  label:'Tiefbau-Kolonnen',      default:1},
      {key:'kol_zaun',     label:'Zaun-Kolonnen',          default:1},
      {key:'kol_found',    label:'Fundamentkolonnen',      default:1},
      {key:'kol_mv',       label:'MV-Kabel-Kolonne',       default:1},
      {key:'ger_kran',     label:'Kräne (Container)',       default:1},
    ],
    toggles: [
      {key:'t_baustr',  label:'Baustraße bauen',            default:true},
      {key:'t_zaun',    label:'Zaunanlage',                 default:true},
      {key:'t_found',   label:'Betonfundamente',            default:true},
      {key:'t_screw',   label:'Schraubpfähle',              default:false},
      {key:'t_mv',      label:'MV-Kabeltrasse',             default:true},
      {key:'t_station', label:'Übergabestation',            default:true},
      {key:'t_com',     label:'FAT / SAT / Commissioning',  default:true},
    ],
    tasks: (p,kol,tog)=>{
      const params=p.params||{};
      const containers=params.containers||Math.ceil((params.mwh||20)/2);
      const trM=params.trenchM||600, roadM=params.roadM||250, fenceM=params.fenceM||600;
      const tasks=[];
      const add=(id,name,days,level,dep,optional,togKey)=>{
        if(optional&&!tog[togKey]) return;
        tasks.push({id,name,duration:Math.max(1,Math.round(days)),level,depId:dep});
      };
      add('bzp_baustr','Baustraße / Zufahrt',roadM/BZP_PERF.road_main/kol.kol_tiefbau,1,null,true,'t_baustr');
      add('bzp_einricht','Baustelleneinrichtung',3,1,null,false,null);
      const s=tog.t_baustr?'bzp_baustr':'bzp_einricht';
      add('bzp_zaun','Zaunanlage',fenceM/BZP_PERF.fence/kol.kol_zaun,1,s,true,'t_zaun');
      add('bzp_found','Betonfundamente Container',containers/BZP_PERF.bess_found/kol.kol_found,1,s,true,'t_found');
      add('bzp_screw','Schraubpfähle setzen',containers*6/BZP_PERF.foundation_ram,1,s,true,'t_screw');
      const foundDone=tog.t_found?'bzp_found':(tog.t_screw?'bzp_screw':s);
      add('bzp_container','Container setzen & ausrichten',containers/BZP_PERF.bess_container/kol.ger_kran,1,foundDone,false,null);
      add('bzp_mv','Kabeltrasse & MV-Kabel',trM/BZP_PERF.mv_cable/kol.kol_mv,1,s,true,'t_mv');
      add('bzp_lv','LV-Verbindungen & Verkabelung',containers*2,1,'bzp_container',false,null);
      add('bzp_station','Übergabestation',15,1,'bzp_mv',true,'t_station');
      add('bzp_com','FAT / SAT / Commissioning',Math.max(10,containers*2),1,'bzp_lv',true,'t_com');
      return tasks;
    }
  },
  wind: {
    kolonnen: [
      {key:'kol_tiefbau', label:'Tiefbau-Kolonnen',        default:1},
      {key:'kol_mv',      label:'MV-Kabel-Kolonne',        default:1},
      {key:'kol_found',   label:'WEA-Fundamentkolonnen',   default:1},
      {key:'ger_kran',    label:'Kräne (WEA-Errichtung)',  default:1},
    ],
    toggles: [
      {key:'t_baustr',  label:'Zuwegung ausbauen',          default:true},
      {key:'t_kranstell','label':'Kranstellflächen anlegen', default:true},
      {key:'t_found',   label:'WEA-Fundamente',             default:true},
      {key:'t_mv',      label:'Infield MV-Kabel',           default:true},
      {key:'t_station', label:'Übergabestation 110kV',      default:true},
      {key:'t_erect',   label:'WEA-Errichtung',             default:true},
      {key:'t_com',     label:'Einmessung / Abnahme',       default:true},
    ],
    tasks: (p,kol,tog)=>{
      const params=p.params||{};
      const weaCount=params.weaCount||5;
      const roadM=params.roadM||5000, trM=params.trenchM||8000;
      const cranePad=params.cranePadM2||1200;
      const tasks=[];
      const add=(id,name,days,level,dep,optional,togKey)=>{
        if(optional&&!tog[togKey]) return;
        tasks.push({id,name,duration:Math.max(1,Math.round(days)),level,depId:dep});
      };
      add('bzp_zuwegung','Zuwegung ausbauen',roadM/BZP_PERF.road/kol.kol_tiefbau,1,null,true,'t_baustr');
      add('bzp_einricht','Baustelleneinrichtung',5,1,null,false,null);
      const s=tog.t_baustr?'bzp_zuwegung':'bzp_einricht';
      add('bzp_kran','Kranstellflächen anlegen',weaCount*cranePad/5000/kol.kol_tiefbau*5,1,s,true,'t_kranstell');
      add('bzp_found','WEA-Fundamente',weaCount/BZP_PERF.wea_found/kol.kol_found,1,s,true,'t_found');
      add('bzp_mv','Infield MV-Kabel',trM/BZP_PERF.mv_cable/kol.kol_mv,1,s,true,'t_mv');
      add('bzp_station','Übergabestation 110kV',30,1,'bzp_mv',true,'t_station');
      const foundDone=tog.t_found?'bzp_found':s;
      add('bzp_erect','WEA-Errichtung',weaCount/BZP_PERF.wea_erect/kol.ger_kran,1,foundDone,true,'t_erect');
      add('bzp_com','Einmessung & Abnahme',weaCount*3,1,tog.t_erect?'bzp_erect':foundDone,true,'t_com');
      return tasks;
    }
  }

async function generateBzp(projId, replace){
  const p=state.projects.find(x=>x.id===projId);
  const tpl=BZP_TEMPLATES[p.type]; if(!tpl) return;
  const cfg=p.bzpConfig||{};

  const kol={};
  tpl.kolonnen.forEach(k=>{ kol[k.key]=cfg[k.key]??k.default; });
  const tog={};
  tpl.toggles.forEach(t=>{ tog[t.key]=cfg[t.key]??t.default; });

  const taskDefs=tpl.tasks(p,kol,tog);
  if(!taskDefs.length){alert('Keine Vorgänge generiert. Bitte mindestens ein Gewerk aktivieren.');return;}

  const startDate=cfg.startDate||p.timeline?.buildStart||today();

  // Build id map: template id → real internal id
  const idMap={};
  taskDefs.forEach(td=>{ idMap[td.id]='sch_'+uid(); });

  // Compute dates sequentially (respecting EA deps)
  const computed={};
  for(const td of taskDefs){
    let start=startDate;
    if(td.depId&&computed[td.depId]){
      start=computed[td.depId].end;
    }
    const end=dateAddDays(start,td.duration);
    computed[td.id]={start,end};
  }

  const newTasks=taskDefs.map(td=>({
    id: idMap[td.id],
    projectId: projId,
    name: td.name,
    start: computed[td.id].start,
    end: computed[td.id].end,
    duration: td.duration,
    level: td.level||1,
    assignee: '',
    progress: 0,
    checklist: [],
    reminder: null,
    reminders: [],
    deps: td.depId&&idMap[td.depId] ? [{predId:idMap[td.depId],type:'EA',lag:0}] : [],
  }));

  if(replace){
    if(!confirm(`Alle ${state.schedule.filter(t=>t.projectId===projId).length} vorhandenen Vorgänge dieses Projekts löschen und durch ${newTasks.length} neue ersetzen?`)) return;
    state.schedule=state.schedule.filter(t=>t.projectId!==projId);
  }
  state.schedule=[...state.schedule,...newTasks];
  await save('schedule');
  alert(`✓ ${newTasks.length} Vorgänge erstellt. Du findest den BZP unter „📅 Bauzeitplan".`);
  showView('bauzeitplan');
}

async function saveProjektKennwerte(e, id){
  e.preventDefault();
  const fd=new FormData(e.target);
  const type=fd.get('type')||null;
  const params={};
  if(type&&EST_TEMPLATES[type]){
    EST_TEMPLATES[type].params.filter(pr=>pr.primary).forEach(pr=>{
      const v=parseFloat(fd.get('param_'+pr.key));
      if(!isNaN(v)) params[pr.key]=v;
    });
  }
  // Carry over existing docChecklist, init if new type
  const proj=state.projects.find(p=>p.id===id);
  let docChecklist=proj?.docChecklist||[];
  if(type&&DOC_TEMPLATES[type]&&docChecklist.length===0){

  );

function handlePhoto(e,targetId){
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ev => {
    // Compress via canvas
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const max = 800;
      let w=img.width, h=img.height;
      if(w>max){h=h*max/w;w=max}
      if(h>max){w=w*max/h;h=max}
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      document.getElementById(targetId).value = canvas.toDataURL('image/jpeg',0.7);
    };
    img.src = ev.target.result;
  };
  r.readAsDataURL(f);
}

function compressImage(file, maxW, maxH, quality){
  return new Promise(resolve=>{
    const reader = new FileReader();
    reader.onload = ev=>{
      const img = new Image();
      img.onload = ()=>{
        let w=img.width, h=img.height;
        const ratio = Math.min(maxW/w, maxH/h, 1);
        w=Math.round(w*ratio); h=Math.round(h*ratio);
        const canvas=document.createElement('canvas');
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}
// Komprimiert auf ca. 0,5 MB base64 (longest side 1200px, q=0.78)
function compressPhoto(file){ return compressImage(file, 1200, 1200, 0.78); }

function printBegehung(id){
  const b = state.diary.find(x=>x.id===id);
  if(!b) return;
  const proj = state.projects.find(p=>p.id===b.projectId);
  const erkenntnisse = b.erkenntnisse||[];

  // ---- Hilfsfunktionen ----
  const esc2 = s=>String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const fmtD = d=>d?new Date(d).toLocaleDateString('de-DE'):'';
  const typColor = t=>t==='Mangel'?'#dc2626':t==='Info'?'#2563eb':'#d97706';
  const typBg   = t=>t==='Mangel'?'#fee2e2':t==='Info'?'#dbeafe':'#fef9c3';

  // Slots: [0] = Projektinfo, [1..n] = Erkenntnisse
  // Erste Seite: 5 Slots (Projektinfo + 4 Erkenntnisse)
  // Folgeseiten: je 5 Erkenntnisse
  const SLOTS_PER_PAGE = 5;
  const FIRST_PAGE_ERK = 4; // auf Seite 1 passen 4 Erkenntnisse + 1 Projektblock

  // Erzeuge Array aller Seitenslots
  // Seite 1: [info, erk0, erk1, erk2, erk3]
  // Seite 2: [erk4, erk5, erk6, erk7, erk8]  usw.
  let pages = [];
  // Seite 1
  let p1 = [{type:'info'}];
  for(let i=0;i<FIRST_PAGE_ERK&&i<erkenntnisse.length;i++) p1.push({type:'erk',e:erkenntnisse[i],idx:i});
  while(p1.length<SLOTS_PER_PAGE) p1.push({type:'empty'});
  pages.push(p1);
  // Folgeseiten
  for(let i=FIRST_PAGE_ERK;i<erkenntnisse.length;i+=SLOTS_PER_PAGE){
    let pg=[];
    for(let j=0;j<SLOTS_PER_PAGE&&(i+j)<erkenntnisse.length;j++) pg.push({type:'erk',e:erkenntnisse[i+j],idx:i+j});
    while(pg.length<SLOTS_PER_PAGE) pg.push({type:'empty'});
    pages.push(pg);
  }

  const slotHtml = (slot,pageIdx,slotIdx)=>{
    if(slot.type==='empty') return `<div class="slot empty-slot"></div>`;
    if(slot.type==='info') return `
      <div class="slot info-slot">
        <div class="slot-inner">
          <div class="info-title">Begehungsprotokoll</div>
          <table class="info-table">
            <tr><td class="info-label">Datum</td><td>${fmtD(b.date)}</td></tr>
            ${proj?`<tr><td class="info-label">Projekt</td><td>${esc2(proj.name)}</td></tr>`:''}
            ${b.workforce?`<tr><td class="info-label">Anwesende</td><td>${esc2(b.workforce)}</td></tr>`:''}
            ${b.grund?`<tr><td class="info-label">Grund</td><td>${esc2(b.grund)}</td></tr>`:''}
            <tr><td class="info-label">Erkenntnisse</td><td>${erkenntnisse.length} gesamt</td></tr>
          </table>
        </div>
      </div>`;
    const e=slot.e;
    const nr=slot.idx+1;
    const tBg = typBg(e.typ), tCol = typColor(e.typ);
    return `
      <div class="slot erk-slot">
        <div class="erk-slot-inner">
          <div class="p-typ-col">
            <span class="p-typ-badge" style="background:${tBg};color:${tCol}">${e.typ||'—'}</span>
          </div>
          <div class="p-vdiv"></div>
          <div class="p-img-col">
            ${e.foto?`<img src="${e.foto}" class="p-img">`:'<div class="p-no-photo">Kein Foto</div>'}
          </div>
          <div class="p-desc-col">${esc2(e.beschreibung||'').replace(/\n/g,'<br>')}</div>
          <div class="p-nr-col">#${nr}</div>
        </div>
      </div>`;
  };

  const pagesHtml = pages.map((page,pi)=>`
    <div class="print-page">
      <div class="page-header-bar">
        <span>${proj?esc2(proj.name):'Begehung'} · ${fmtD(b.date)}</span>
        <span>Seite ${pi+1} / ${pages.length}</span>
      </div>
      <div class="slots-grid">
        ${page.map((slot,si)=>slotHtml(slot,pi,si)).join('')}
      </div>
    </div>
  `).join('');

  const html=`<!DOCTYPE html>
<html lang="de"><head>
<meta charset="UTF-8">
<title>Begehung ${fmtD(b.date)}</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,Helvetica,sans-serif}
  @page{size:A4 portrait;margin:10mm}
  body{background:#fff;color:#111}
  .print-page{
    width:190mm;height:277mm;
    display:flex;flex-direction:column;
    page-break-after:always;
    overflow:hidden;
  }
  .print-page:last-child{page-break-after:auto}
  .page-header-bar{
    display:flex;justify-content:space-between;align-items:center;
    font-size:8pt;color:#555;border-bottom:1px solid #ccc;
    padding-bottom:3mm;margin-bottom:3mm;flex-shrink:0;

// Quantilberechnung mit linearer Interpolation
function quantile(values, q){
  if(!values || values.length===0) return 0;
  const sorted = [...values].sort((a,b)=>a-b);
  if(sorted.length===1) return sorted[0];
  const pos = (sorted.length-1) * q;
  const lo = Math.floor(pos), hi = Math.ceil(pos);
  if(lo===hi) return sorted[lo];
  return sorted[lo] + (sorted[hi]-sorted[lo]) * (pos-lo);
}
function fmtEur(n){
  return new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR'}).format(n||0);
}
function priceStats(item){
  const prices = (item.history||[]).map(h=>h.price).filter(p=>!isNaN(p));
  if(prices.length===0) return {n:0,min:0,max:0,avg:0,median:0};
  return {
    n: prices.length,
    min: Math.min(...prices),
    max: Math.max(...prices),
    avg: prices.reduce((a,b)=>a+b,0)/prices.length,
    median: quantile(prices,0.5)
  };
}

  await save('priceItems');

}

  if(currentCalcId) return renderCalcDetail();
  return `

      </div>

    ${state.priceItems.length===0?'<div class="card empty"><span class="empty-icon">💡</span>Lege zuerst Positionen in der Preisdatenbank an, dann kannst du hier kalkulieren.</div>':
    state.calculations.length===0?'<div class="card empty"><span class="empty-icon">🧮</span>Noch keine Kalkulationen. Erstelle deine erste!</div>':
    `<table><thead><tr><th>Name</th><th>Projekt</th><th>Positionen</th><th>Quantil</th><th style="text-align:right">Summe</th><th></th></tr></thead><tbody>
    ${state.calculations.map(c=>{
      const proj = state.projects.find(p=>p.id===c.projectId);

    }).join('')}
    </tbody></table>`}

function renderPreiseMitZurueck(){
  return `
    <div class="page-header">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="btn btn-secondary btn-sm" onclick="kalcShowPreise=false;render()">← Zurück zur Kalkulation</button>
        <h2>💰 Preisdatenbank</h2>
      </div>
      <div>
        <button class="btn btn-secondary" onclick="importPricesFromTasks()">📥 Beispiele</button>
        <button class="btn" onclick="editPriceItem()">+ Neue Position</button>
      </div>
    </div>
    ${renderPreiseContent()}
  `;
}
function calcTotal(calc){
  if(calc.categories){
    return (calc.categories||[]).reduce((s,cat)=>
      s+(cat.sections||[]).reduce((s2,sec)=>
        s2+(sec.lines||[]).reduce((s3,l)=>s3+linePrice(l,calc.quantile)*l.quantity,0),0),0);
  }
  return (calc.lines||[]).reduce((sum,l)=>sum+linePrice(l,calc.quantile)*l.quantity,0);
}
function linePrice(line, defaultQ){
  const item = state.priceItems.find(i=>i.id===line.itemId);
  if(!item) return 0;
  const q = line.quantile != null ? line.quantile : defaultQ;
  const prices = (item.history||[]).map(h=>h.price);
  return quantile(prices, q);
}
async function newCalculation(){
  const name = prompt('Name der Kalkulation:','Kalkulation '+new Date().toLocaleDateString('de-DE'));
  if(!name) return;
  const calc = {
    id:uid(),name,
    projectId: state.currentProject || (state.projects[0]?.id || ''),
    quantile: 0.5,
    categories:[],
    created: new Date().toISOString()
  };
  state.calculations.push(calc);
  await save('calculations');
  currentCalcId = calc.id;
  render();
}
function openCalc(id){currentCalcId = id; render();}
function closeCalc(){currentCalcId = null; render();}
async function deleteCalculation(id){
  if(!confirm('Kalkulation löschen?')) return;
  state.calculations = state.calculations.filter(c=>c.id!==id);
  await save('calculations');
  render();
}

// ---- Kategorie-Management ----
function addCategory(calcId){
  openModal(`
    <h3>Kategorie hinzufügen</h3>

      <label>Name der Kategorie</label>
      <input id="newCatName" list="catPresets" placeholder="z.B. Wegebau" autofocus>

    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Abbrechen</button>
      <button class="btn" onclick="confirmAddCategory('${calcId}')">Hinzufügen</button>
    </div>
  `);
}
async function confirmAddCategory(calcId){
  const name=(document.getElementById('newCatName').value||'').trim();
  if(!name) return;
  const calc=state.calculations.find(c=>c.id===calcId);
  if(!calc.categories) calc.categories=[];
  calc.categories.push({id:uid(),name,sections:[]});
  await save('calculations'); closeModal(); render();
}
async function deleteCategory(calcId,catId){
  if(!confirm('Kategorie mit allen Abschnitten löschen?')) return;
  const calc=state.calculations.find(c=>c.id===calcId);
  calc.categories=calc.categories.filter(c=>c.id!==catId);
  await save('calculations'); render();
}
async function renameCategory(calcId,catId){
  const calc=state.calculations.find(c=>c.id===calcId);
  const cat=calc.categories.find(c=>c.id===catId);
  const name=prompt('Kategorie umbenennen:',cat.name);
  if(!name) return;
  cat.name=name; await save('calculations'); render();
}

// ---- Abschnitt-Management ----
async function addSection(calcId,catId){
  const calc=state.calculations.find(c=>c.id===calcId);
  const cat=calc.categories.find(c=>c.id===catId);
  const name=prompt('Name des Abschnitts:','Abschnitt '+(cat.sections.length+1));
  if(!name) return;
  cat.sections.push({id:uid(),name,lines:[]});
  await save('calculations'); render();
}
async function deleteSection(calcId,catId,secId){
  if(!confirm('Abschnitt löschen?')) return;
  const calc=state.calculations.find(c=>c.id===calcId);
  const cat=calc.categories.find(c=>c.id===catId);
  cat.sections=cat.sections.filter(s=>s.id!==secId);
  await save('calculations'); render();
}
async function renameSection(calcId,catId,secId){
  const calc=state.calculations.find(c=>c.id===calcId);
  const cat=calc.categories.find(c=>c.id===catId);
  const sec=cat.sections.find(s=>s.id===secId);
  const name=prompt('Abschnitt umbenennen:',sec.name);
  if(!name) return;
  sec.name=name; await save('calculations'); render();
}

function evalFormula(formula, p){
  try{ return (new Function('p','return '+formula))(p); }
  catch(e){ return 0; }
}

function computeParams(est){
  const tpl = EST_TEMPLATES[est.type];
  if(!tpl) return {};
  const proj = state.projects.find(p=>p.id===est.projectId);
  const projParams = (proj?.type===est.type) ? (proj.params||{}) : {};
  const p = {};
  for(const param of tpl.params){
    const estOv = est.paramOverrides?.[param.key];
    const projVal = projParams[param.key];
    if(estOv !== undefined && estOv !== null){
      p[param.key] = estOv;
    } else if(projVal !== undefined && projVal !== null && param.primary){
      p[param.key] = projVal;
    } else if(param.formula){
      p[param.key] = Math.round(evalFormula(param.formula, p)*100)/100;
    } else {
      p[param.key] = param.default ?? 0;
    }
  }
  return p;
}

function estLineKey(catIdx, lineIdx){ return `${catIdx}_${lineIdx}`; }

function estLineQty(est, catIdx, lineIdx, params){
  const key = estLineKey(catIdx, lineIdx);
  const ov = est.lineOverrides?.[key];
  if(ov?.quantity !== undefined && ov.quantity !== null) return ov.quantity;
  const tpl = EST_TEMPLATES[est.type];
  const formula = tpl.categories[catIdx].lines[lineIdx].formula;
  return Math.round(evalFormula(formula, params)*100)/100;
}

function estLinePrice(est, catIdx, lineIdx){
  const key = estLineKey(catIdx, lineIdx);
  const ov = est.lineOverrides?.[key];
  if(ov?.price !== undefined && ov.price !== null) return ov.price;
  return EST_TEMPLATES[est.type].categories[catIdx].lines[lineIdx].price ?? 0;
}

function estTotal(est){
  const tpl = EST_TEMPLATES[est.type];
  if(!tpl) return 0;
  const params = computeParams(est);
  let total = 0;
  tpl.categories.forEach((cat,ci)=>{
    cat.lines.forEach((_,li)=>{ total += estLineQty(est,ci,li,params)*estLinePrice(est,ci,li); });
    (est.extraLines?.[ci]||[]).forEach(el=>{ total += (el.quantity||0)*(el.price||0); });
  });
  (est.customCategories||[]).forEach(cat=>{
    (cat.lines||[]).forEach(line=>{ total += (line.quantity||0)*(line.price||0); });
  });
  return total;
}

    return `<tr style="background:var(--warn-bg)">
      <td><strong>${esc(el.name)}</strong>${el.note?`<br><small style="color:var(--muted)">📝 ${esc(el.note)}</small>`:''}<br><small style="color:var(--accent);font-size:10px">+ Eigene Position</small></td>
      <td style="text-align:right;color:var(--muted);font-size:12px">—</td>
      <td style="text-align:right"><input type="number" step="any" value="${el.quantity||1}" style="width:80px;text-align:right" onchange="updateEstExtraLine('${est.id}',${ci},${eli},'quantity',parseFloat(this.value)||0)"></td>
      <td>${esc(el.unit)}</td>
      <td style="text-align:right"><input type="number" step="0.01" value="${el.price||0}" style="width:90px;text-align:right" onchange="updateEstExtraLine('${est.id}',${ci},${eli},'price',parseFloat(this.value)||0)"></td>
      <td style="text-align:right;font-weight:700;color:var(--primary)">${fmtEur(ges)}</td>
      <td><button class="btn btn-sm btn-danger" onclick="deleteEstExtraLine('${est.id}',${ci},${eli})" title="Löschen">×</button></td>
    </tr>`;
  }

  // Helper: Custom-Kategorie-Zeile rendern
  function renderCustomLine(line, catId, li){
    const ges=(line.quantity||0)*(line.price||0);
    return `<tr>
      <td><strong>${esc(line.name)}</strong>${line.note?`<br><small style="color:var(--muted)">📝 ${esc(line.note)}</small>`:''}</td>
      <td style="text-align:right;color:var(--muted);font-size:12px">—</td>
      <td style="text-align:right"><input type="number" step="any" value="${line.quantity||1}" style="width:80px;text-align:right" onchange="updateEstCustomLine('${est.id}','${catId}',${li},'quantity',parseFloat(this.value)||0)"></td>
      <td>${esc(line.unit)}</td>
      <td style="text-align:right"><input type="number" step="0.01" value="${line.price||0}" style="width:90px;text-align:right" onchange="updateEstCustomLine('${est.id}','${catId}',${li},'price',parseFloat(this.value)||0)"></td>
      <td style="text-align:right;font-weight:700;color:var(--primary)">${fmtEur(ges)}</td>
      <td><button class="btn btn-sm btn-danger" onclick="deleteEstCustomLine('${est.id}','${catId}',${li})">×</button></td>
    </tr>`;
  }

  // Template-Kategorien
  const tplCatsHtml = tpl.categories.map((cat,ci)=>{
    const tplTotal = cat.lines.reduce((s,_,li)=>s+estLineQty(est,ci,li,params)*estLinePrice(est,ci,li),0);
    const extraLines = est.extraLines?.[ci]||[];
    const extraTotal = extraLines.reduce((s,el)=>s+(el.quantity||0)*(el.price||0),0);
    const catTotal = tplTotal + extraTotal;
    return `
      <div style="margin-bottom:16px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)">
        <div style="background:var(--primary);color:#fff;padding:10px 16px;display:flex;align-items:center;gap:8px">
          <span>📁</span><strong style="flex:1">${esc(cat.name)}</strong>
          <span style="opacity:.85;font-size:13px">${fmtEur(catTotal)}</span>
        </div>
        ${lineTableHead}
        ${cat.lines.map((line,li)=>{
          const key=estLineKey(ci,li);
          const autoQty=Math.round(evalFormula(line.formula,params)*100)/100;
          const ovQty=est.lineOverrides?.[key]?.quantity;
          const effQty=estLineQty(est,ci,li,params);
          const effPrice=estLinePrice(est,ci,li);
          const hasOvQty=ovQty!==undefined&&ovQty!==null;
          const hasOvPrc=est.lineOverrides?.[key]?.price!==undefined&&est.lineOverrides?.[key]?.price!==null;
          return `<tr>
            <td><strong>${esc(line.name)}</strong>${line.note?`<br><small style="color:var(--muted)">ℹ️ ${esc(line.note)}</small>`:''}</td>
            <td style="text-align:right;color:var(--muted);font-size:12px">${autoQty.toLocaleString('de-DE')}</td>
            <td style="text-align:right">
              <input type="number" step="any" placeholder="${autoQty}" value="${hasOvQty?ovQty:''}"
                style="width:80px;text-align:right;${hasOvQty?'color:var(--accent);font-weight:600':''}"
                onchange="setEstLine('${est.id}','${key}','quantity',this.value===''?null:parseFloat(this.value))">
              ${hasOvQty?`<button style="font-size:10px;color:var(--muted);background:none;border:none;cursor:pointer" onclick="setEstLine('${est.id}','${key}','quantity',null)">↺</button>`:''}
            </td>
            <td>${esc(line.unit)}</td>
            <td style="text-align:right">
              <input type="number" step="0.01" value="${effPrice}" style="width:90px;text-align:right;${hasOvPrc?'color:var(--accent);font-weight:600':''}"
                onchange="setEstLine('${est.id}','${key}','price',parseFloat(this.value))">
              ${hasOvPrc?`<button style="font-size:10px;color:var(--muted);background:none;border:none;cursor:pointer" onclick="setEstLine('${est.id}','${key}','price',null)">↺</button>`:''}
            </td>
            <td style="text-align:right;font-weight:700;color:var(--primary)">${fmtEur(effQty*effPrice)}</td>
            <td></td>
          </tr>`;
        }).join('')}
        ${extraLines.map((el,eli)=>renderExtraLine(el,ci,eli)).join('')}
        </tbody><tfoot>
          <tr style="background:var(--info-bg)">
            <td colspan="4" style="text-align:right;font-weight:600;padding:8px">Summe ${esc(cat.name)}:</td>
            <td colspan="2" style="text-align:right;font-weight:700;color:var(--primary)">${fmtEur(catTotal)}</td>
            <td></td>
          </tr>
        </tfoot></table>
        <div style="padding:8px 12px;background:var(--surface-2);border-top:1px solid var(--border)">
          <button class="btn btn-sm btn-secondary" onclick="openEstPositionPicker('${est.id}','template',${ci})">+ Position hinzufügen</button>
        </div>
      </div>`;
  }).join('');

  // Eigene Kategorien
  const customCatsHtml = (est.customCategories||[]).map(cat=>{
    const catTotal=(cat.lines||[]).reduce((s,l)=>s+(l.quantity||0)*(l.price||0),0);
    return `
      <div style="margin-bottom:16px;border:2px solid var(--accent);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)">
        <div style="background:var(--accent);color:#fff;padding:10px 16px;display:flex;align-items:center;gap:8px">
          <span>📂</span><strong style="flex:1">${esc(cat.name)}</strong>
          <span style="opacity:.85;font-size:13px">${fmtEur(catTotal)}</span>
          <button class="btn btn-sm" style="background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff" onclick="renameEstCustomCat('${est.id}','${cat.id}')">✏️</button>
          <button class="btn btn-sm btn-danger" onclick="deleteEstCustomCat('${est.id}','${cat.id}')">🗑️</button>
        </div>
        ${lineTableHead}
        ${(cat.lines||[]).map((line,li)=>renderCustomLine(line,cat.id,li)).join('')}
        ${(cat.lines||[]).length===0?`<tr><td colspan="7" style="padding:10px;color:var(--muted);text-align:center;font-size:13px">Noch keine Positionen.</td></tr>`:''}
        </tbody><tfoot>
          <tr style="background:var(--warn-bg)">
            <td colspan="4" style="text-align:right;font-weight:600;padding:8px">Summe ${esc(cat.name)}:</td>
            <td colspan="2" style="text-align:right;font-weight:700;color:var(--accent)">${fmtEur(catTotal)}</td>
            <td></td>
          </tr>
        </tfoot></table>
        <div style="padding:8px 12px;background:var(--surface-2);border-top:1px solid var(--border)">
          <button class="btn btn-sm btn-secondary" onclick="openEstPositionPicker('${est.id}','custom','${cat.id}')">+ Position hinzufügen</button>
        </div>
      </div>`;
  }).join('');

  return `
    <div class="page-header">
      <div>
        <button class="btn btn-secondary btn-sm" onclick="currentEstimateId=null;render()">← Zurück</button>
        <h2 style="display:inline-block;margin-left:10px">${esc(est.name)}</h2>
        <span class="badge aufgabe" style="margin-left:8px">${esc(tpl.label)}</span>
      </div>
      <div>
        <button class="btn btn-secondary" onclick="renameEstimate('${est.id}')">✏️ Umbenennen</button>
        <button class="btn" onclick="addEstCustomCat('${est.id}')">+ Eigene Kategorie</button>
      </div>
    </div>
    ${paramsHtml}
    ${bandHtml}
    ${tplCatsHtml}
    ${customCatsHtml}
    <div class="card" style="margin-top:8px;text-align:right;padding:18px">
      <div style="display:inline-flex;flex-direction:column;gap:6px;min-width:280px">
        <div style="display:flex;justify-content:space-between;gap:40px">
          <span style="color:var(--muted)">Gesamtsumme (netto):</span>
          <strong style="color:var(--primary);font-size:22px">${fmtEur(total)}</strong>
        </div>
        <div style="display:flex;justify-content:space-between;gap:40px;font-size:13px;color:var(--muted)">
          <span>+ 19% MwSt:</span><span>${fmtEur(total*0.19)}</span>
        </div>
        <div style="display:flex;justify-content:space-between;gap:40px;padding-top:8px;border-top:1px solid var(--border)">
          <span style="font-weight:600">Gesamtsumme (brutto):</span>
          <strong style="color:var(--primary)">${fmtEur(total*1.19)}</strong>
        </div>
        <div style="font-size:11px;color:var(--muted);margin-top:4px;text-align:right">
          Spez. Kosten: ${fmtEur(total/(params[Object.keys(params)[0]]||1))} / ${esc(tpl.params[0].unit)}
        </div>
      </div>
    </div>
  `;
}

// ---- Eigene Kategorien ----
async function addEstCustomCat(estId){
  const name=prompt('Name der Kategorie:','Sonstiges');
  if(!name) return;
  const est=state.estimates.find(e=>e.id===estId);
  if(!est.customCategories) est.customCategories=[];
  est.customCategories.push({id:uid(),name,lines:[]});
  await save('estimates'); render();
}
async function deleteEstCustomCat(estId,catId){
  if(!confirm('Kategorie löschen?')) return;
  const est=state.estimates.find(e=>e.id===estId);
  est.customCategories=(est.customCategories||[]).filter(c=>c.id!==catId);
  await save('estimates'); render();
}
async function renameEstCustomCat(estId,catId){
  const est=state.estimates.find(e=>e.id===estId);
  const cat=(est.customCategories||[]).find(c=>c.id===catId);
  const name=prompt('Umbenennen:',cat.name);
  if(!name) return;
  cat.name=name; await save('estimates'); render();
}

// ---- Positionen hinzufügen (Template-Extra + Custom) ----
let _estAddTarget=null;
function openEstPositionPicker(estId,targetType,targetRef){
  _estAddTarget={estId,targetType,targetRef};
  openModal(`
    <h3>Position hinzufügen</h3>
    ${state.priceItems.length>0?`
    <div style="margin-bottom:14px">
      <div style="font-size:11px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase">Aus Preisdatenbank wählen</div>
      <input type="text" id="estPosSearch" placeholder="🔍 Suchen…" oninput="filterEstPos(this.value)" style="margin-bottom:6px">
      <div id="estPosList" style="max-height:160px;overflow-y:auto;border:1px solid var(--border);border-radius:6px">
        ${state.priceItems.map(it=>{const s=priceStats(it);return `<div class="est-pos-item"
          data-name="${esc(it.name.toLowerCase())}"
          style="padding:8px 10px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center"
          onclick="selectEstPosFromDB('${it.id}')"
          onmouseover="this.style.background='var(--info-bg)'" onmouseout="this.style.background=''">
          <div><strong style="font-size:13px">${esc(it.name)}</strong><br><small style="color:var(--muted)">${esc(it.category||'')} • ${esc(it.unit)}</small></div>
          <div style="text-align:right;font-size:12px;color:var(--muted);margin-left:8px">Median:<br><strong>${s.n?fmtEur(s.median):'-'}</strong></div>
        </div>`}).join('')}
      </div>
    </div>
    <div style="font-size:11px;font-weight:600;color:var(--muted);margin-bottom:8px;text-transform:uppercase">Manuelle Eingabe</div>
    `:''}
    <input type="hidden" id="estPosPriceItemId" value="">
    <div class="form-group"><label>Bezeichnung *</label><input id="estPosName" placeholder="z.B. Sondermaßnahme"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
      <div class="form-group"><label>Menge</label><input type="number" id="estPosQty" step="any" value="1"></div>
      <div class="form-group"><label>Einheit</label><input id="estPosUnit" value="psch"></div>
      <div class="form-group"><label>Preis/Einheit (€)</label><input type="number" id="estPosPrice" step="0.01" value="0"></div>
    </div>
    <div class="form-group"><label>Notiz</label><input id="estPosNote" placeholder="Optional"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Abbrechen</button>
      <button class="btn" onclick="confirmAddEstPosition()">Hinzufügen</button>
    </div>
  `);
}
function filterEstPos(q){
  const ql=q.toLowerCase();
  document.querySelectorAll('.est-pos-item').forEach(el=>{
    el.style.display=el.dataset.name.includes(ql)?'':'none';
  });
}
function selectEstPosFromDB(itemId){
  const it=state.priceItems.find(i=>i.id===itemId); if(!it) return;
  const s=priceStats(it);
  document.getElementById('estPosPriceItemId').value=itemId;
  document.getElementById('estPosName').value=it.name;
  document.getElementById('estPosUnit').value=it.unit||'psch';
  document.getElementById('estPosPrice').value=s.n?s.median.toFixed(2):0;
  document.getElementById('estPosNote').value=it.category||'';
}
async function confirmAddEstPosition(){
  const name=(document.getElementById('estPosName').value||'').trim();
  if(!name){alert('Bitte Bezeichnung eingeben.');return;}
  const newLine={
    id:uid(), name,
    unit:document.getElementById('estPosUnit').value||'psch',
    quantity:parseFloat(document.getElementById('estPosQty').value)||1,
    price:parseFloat(document.getElementById('estPosPrice').value)||0,
    note:document.getElementById('estPosNote').value||'',
    priceItemId:document.getElementById('estPosPriceItemId').value||null
  };
  const {estId,targetType,targetRef}=_estAddTarget;
  const est=state.estimates.find(e=>e.id===estId);
  if(targetType==='template'){
    if(!est.extraLines) est.extraLines={};
    if(!est.extraLines[targetRef]) est.extraLines[targetRef]=[];
    est.extraLines[targetRef].push(newLine);
  } else {
    const cat=(est.customCategories||[]).find(c=>c.id===String(targetRef));
    if(cat){if(!cat.lines) cat.lines=[]; cat.lines.push(newLine);}
  }
  await save('estimates'); closeModal(); render();
}
async function updateEstExtraLine(estId,ci,eli,field,value){
  const est=state.estimates.find(e=>e.id===estId);
  est.extraLines[ci][eli][field]=value;
  await save('estimates'); render();
}
async function deleteEstExtraLine(estId,ci,eli){
  const est=state.estimates.find(e=>e.id===estId);
  est.extraLines[ci].splice(eli,1);
  await save('estimates'); render();
}
async function updateEstCustomLine(estId,catId,li,field,value){
  const est=state.estimates.find(e=>e.id===estId);
  const cat=(est.customCategories||[]).find(c=>c.id===catId);
  if(cat) cat.lines[li][field]=value;
  await save('estimates'); render();
}
async function deleteEstCustomLine(estId,catId,li){
  const est=state.estimates.find(e=>e.id===estId);
  const cat=(est.customCategories||[]).find(c=>c.id===catId);
  if(cat) cat.lines.splice(li,1);
  await save('estimates'); render();
}

    <div class="form-group">
      <label>Name</label>
      <input id="estName" placeholder="z.B. PV-Anlage Wetzen 2026" autofocus>

      <select id="estProject">
