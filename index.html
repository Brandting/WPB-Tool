<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PV · BESS · WIND – BauLeiter</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e5007d">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BauLeiter">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%23e5007d'/%3E%3Ctext x='50' y='68' font-size='58' text-anchor='middle' fill='white' font-family='system-ui' font-weight='bold'%3EBL%3C/text%3E%3C/svg%3E">
<style>
  :root, [data-theme="enercity-dark"]{
    --bg:#111111; --card:#1e1e1e; --surface-2:#181818; --info-bg:#25101e; --warn-bg:#1e0e1a;
    --primary:#e5007d; --primary-dark:#b8005e; --accent:#9400d3;
    --text:#f0e6ec; --muted:#b07090; --border:#2e1520;
    --green:#3ecf6e; --yellow:#f5a623; --red:#e60012; --blue:#c040e0;
    --header-bg:linear-gradient(135deg,#2a0008 0%,#1e0018 50%,#16002e 100%);
    --header-text:#f0d0e0; --nav-bg:#161616; --nav-active-bg:#2a0e1e;
    --shadow:0 1px 4px rgba(229,0,125,.2);
    --radius:14px; --radius-btn:999px;
    --font:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;
  }
  [data-theme="enercity"]{
    --bg:#fafafa; --card:#ffffff; --surface-2:#f9f0f6; --info-bg:#fdf0fa; --warn-bg:#fff4f0;
    --primary:#e5007d; --primary-dark:#b8005e; --accent:#9400d3;
    --text:#1a1a1a; --muted:#7a4070; --border:#f0d6ea;
    --green:#0aaf60; --yellow:#f5a623; --red:#e60012; --blue:#9400d3;
    --header-bg:linear-gradient(135deg,#e60012 0%,#e5007d 50%,#9400d3 100%);
    --header-text:#ffffff; --nav-bg:#ffffff; --nav-active-bg:#fdf0fa;
    --shadow:0 1px 3px rgba(229,0,125,.1);
    --radius:14px; --radius-btn:999px;
    --font:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;
  }
  [data-theme="hell"]{
    --bg:#f4f6f8; --card:#ffffff; --surface-2:#f8fafc; --info-bg:#f0f7ff; --warn-bg:#fff7ed;
    --primary:#1f4e79; --primary-dark:#16385a; --accent:#ff8800;
    --text:#1f2937; --muted:#6b7280; --border:#e5e7eb;
    --green:#16a34a; --yellow:#eab308; --red:#dc2626; --blue:#2563eb;
    --header-bg:#1f4e79; --header-text:#ffffff;
    --nav-bg:#ffffff; --nav-active-bg:#e8f0f8;
    --shadow:0 1px 3px rgba(0,0,0,.05);
    --radius:8px; --radius-btn:6px;
    --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  [data-theme="dark"]{
    --bg:#111111; --card:#1e1e1e; --surface-2:#181818; --info-bg:#0a1f14; --warn-bg:#221a10;
    --primary:#4d9fff; --primary-dark:#2d7fe0; --accent:#f97316;
    --text:#e8e8e8; --muted:#888888; --border:#2e2e2e;
    --green:#3ecf6e; --yellow:#f5a623; --red:#f04747; --blue:#4d9fff;
    --header-bg:#0d0d0d; --header-text:#e8e8e8;
    --nav-bg:#161616; --nav-active-bg:#252525;
    --shadow:0 1px 4px rgba(0,0,0,.5);
    --radius:10px; --radius-btn:8px;
    --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:var(--font)}
  body{background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
  header{background:var(--header-bg);color:var(--header-text);padding:8px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 6px rgba(0,0,0,.1)}
  header h1{display:flex;align-items:center;margin:0}
  .project-select{background:rgba(255,255,255,.18);color:var(--header-text);border:1px solid rgba(255,255,255,.3);padding:8px 16px;border-radius:var(--radius-btn);font-size:14px;cursor:pointer}
  .project-select option{color:#000}
  .layout{display:flex;flex:1;min-height:0}
  nav{width:220px;background:var(--nav-bg);border-right:1px solid var(--border);padding:16px 0;flex-shrink:0;display:flex;flex-direction:column}
  nav button{display:flex;align-items:center;gap:12px;width:100%;background:none;border:none;padding:12px 20px;font-size:14px;color:var(--text);cursor:pointer;text-align:left;border-left:3px solid transparent;font-family:var(--font)}
  nav button:hover{background:var(--surface-2)}
  nav button.active{background:var(--nav-active-bg);border-left-color:var(--primary);color:var(--primary);font-weight:600}
  .nav-spacer{flex:1}
  .nav-bottom{border-top:1px solid var(--border);padding-top:8px;margin-top:8px}
  main{flex:1;padding:24px;overflow-y:auto;background:var(--bg)}
  .page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px}
  .page-header h2{font-size:24px;color:var(--primary);font-weight:600}
  .btn{background:var(--primary);color:#fff;border:none;padding:10px 20px;border-radius:var(--radius-btn);font-size:14px;cursor:pointer;font-weight:500;display:inline-flex;align-items:center;gap:6px;font-family:var(--font);transition:all .15s}
  .btn:hover{background:var(--primary-dark);transform:translateY(-1px)}
  .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
  .btn-secondary{background:var(--card);color:var(--primary);border:1px solid var(--primary)}
  .btn-secondary:hover{background:var(--info-bg)}
  .btn-danger{background:var(--red)}
  .btn-danger:hover{background:#b91c1c}
  .btn-sm{padding:6px 14px;font-size:12px}
  .grid{display:grid;gap:16px}
  .grid-stats{grid-template-columns:repeat(auto-fit,minmax(200px,1fr));margin-bottom:24px}
  .card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);border:1px solid var(--border)}
  .stat-card{text-align:center}
  .stat-card .num{font-size:36px;font-weight:700;color:var(--primary)}
  .stat-card .label{color:var(--muted);font-size:13px;text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
  .stat-card.green .num{color:var(--green)}
  .stat-card.yellow .num{color:var(--yellow)}
  .stat-card.red .num{color:var(--red)}
  table{width:100%;border-collapse:collapse;background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
  th{background:var(--surface-2);text-align:left;padding:12px;font-size:12px;text-transform:uppercase;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border)}
  td{padding:12px;border-bottom:1px solid var(--border);font-size:14px;vertical-align:top;color:var(--text)}
  tr:last-child td{border-bottom:none}
  tr:hover{background:var(--surface-2)}
  .badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;text-transform:uppercase}
  .badge.offen{background:#fee2e2;color:#991b1b}
  .badge.bearbeitung{background:#fef3c7;color:#92400e}
  .badge.erledigt{background:#dcfce7;color:#166534}
  .badge.hoch{background:#fee2e2;color:#991b1b}
  .badge.mittel{background:#fef3c7;color:#92400e}
  .badge.niedrig{background:#dbeafe;color:#1e40af}
  .badge.maengel{background:#fde2e2;color:#7f1d1d}
  .badge.aufgabe{background:#dbeafe;color:#1e3a8a}
  [data-theme="dark"] .badge.offen,[data-theme="dark"] .badge.hoch,[data-theme="dark"] .badge.maengel{background:#7f1d1d;color:#fecaca}
  [data-theme="dark"] .badge.bearbeitung,[data-theme="dark"] .badge.mittel{background:#78350f;color:#fde68a}
  [data-theme="dark"] .badge.erledigt{background:#14532d;color:#bbf7d0}
  [data-theme="dark"] .badge.niedrig,[data-theme="dark"] .badge.aufgabe{background:#1e3a8a;color:#bfdbfe}
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center;padding:20px}
  .modal-bg.show{display:flex}
  .modal{background:var(--card);color:var(--text);border-radius:var(--radius);max-width:960px;width:100%;max-height:90vh;overflow-y:auto;padding:28px;border:1px solid var(--border)}
  .modal h3{color:var(--primary);margin-bottom:18px;font-size:20px}
  .modal h4{color:var(--text)}
  .form-group{margin-bottom:14px}
  label{display:block;font-size:13px;color:var(--text);margin-bottom:5px;font-weight:500}
  input,select,textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-btn);font-size:14px;font-family:inherit;background:var(--card);color:var(--text)}
  [data-theme="dark"] input,[data-theme="dark"] select,[data-theme="dark"] textarea{background:var(--surface-2)}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(229,0,125,.1)}
  textarea{min-height:80px;resize:vertical}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
  .empty{text-align:center;padding:40px;color:var(--muted)}
  .empty-icon{font-size:48px;margin-bottom:10px;display:block}
  .filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .filters select,.filters input{flex:0 0 auto;width:auto;min-width:140px}
  .photo-thumb{width:50px;height:50px;border-radius:4px;object-fit:cover;border:1px solid var(--border)}
  .photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:6px;margin-top:8px}
  .photo-grid img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:4px}
  .loading{text-align:center;padding:60px;color:var(--muted)}
  .actions-cell{white-space:nowrap}
  .actions-cell button{margin-left:4px}
  /* Override hardcoded inline-bgs für Dark Mode */
  [data-theme="dark"] [style*="background:#f8fafc"],[data-theme="dark"] [style*="background:#fafbfc"]{background:var(--surface-2)!important}
  [data-theme="dark"] [style*="background:#f0f7ff"],[data-theme="dark"] [style*="background:#e8f0f8"]{background:var(--info-bg)!important;border-color:var(--border)!important}
  [data-theme="dark"] [style*="background:#fff7ed"],[data-theme="dark"] [style*="background:#fff0ed"]{background:var(--warn-bg)!important;border-color:var(--border)!important}
  [data-theme="dark"] [style*="color:var(--text)"]{color:var(--text)!important}
  /* Theme-Karten */
  .theme-card{padding:18px;border:2px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .2s;background:var(--card)}
  .theme-card:hover{border-color:var(--primary);transform:translateY(-2px)}
  .theme-card.selected{border-color:var(--primary);box-shadow:0 4px 12px rgba(229,0,125,.15)}
  .theme-preview{height:80px;border-radius:8px;margin-bottom:10px;display:flex;overflow:hidden}
  .theme-preview .pv-side{flex:0 0 30%;border-right:1px solid rgba(0,0,0,.1)}
  .theme-preview .pv-main{flex:1;padding:8px;display:flex;flex-direction:column;gap:4px}
  .theme-preview .pv-bar{height:8px;border-radius:4px}
  @media(max-width:768px){
    nav{width:60px}
    nav button span{display:none}
    main{padding:16px}
  }
  /* Gantt */
  .gantt-container{padding:0;overflow:hidden}
  .gantt-row{display:flex;align-items:stretch;border-bottom:1px solid var(--border);min-height:36px}
  .gantt-name{flex:0 0 240px;padding:8px 12px;font-size:13px;border-right:1px solid var(--border);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;flex-direction:column;justify-content:center}
  .gantt-bar-area{flex:1;position:relative;min-width:0}
  .gantt-bar{position:absolute;top:8px;height:20px;background:var(--primary);border-radius:3px;color:#fff;font-size:11px;padding:2px 6px;white-space:nowrap;overflow:hidden;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.15);z-index:2}
  .gantt-bar.milestone{background:var(--accent);width:18px!important;height:18px;border-radius:50%;text-align:center;padding:0;margin-left:-9px;margin-top:1px;box-shadow:0 0 0 2px var(--card)}
  .gantt-bar.done{background:var(--green)}
  .gantt-bar .progress{position:absolute;top:0;left:0;height:100%;background:rgba(255,255,255,.3);border-radius:3px}
  .gantt-week-line{position:absolute;top:0;bottom:0;width:1px;background:var(--border);pointer-events:none;z-index:1}
  .gantt-today-line{position:absolute;top:0;bottom:0;width:2px;background:var(--red);pointer-events:none;z-index:3;opacity:.6}
  .gantt-header{display:flex;background:var(--surface-2);border-bottom:2px solid var(--border);font-weight:600;color:var(--muted);position:sticky;top:0;z-index:5}
  .gantt-header-name{flex:0 0 240px;padding:0 12px;border-right:1px solid var(--border);display:flex;align-items:center;font-size:12px;text-transform:uppercase;letter-spacing:.5px}
  .gantt-header-dates{flex:1;display:flex;flex-direction:column;position:relative;min-width:0}
  .gantt-month-row{position:relative;height:26px;border-bottom:1px solid var(--border)}
  .gantt-week-row{position:relative;height:22px}
  .gantt-month-cell{position:absolute;top:0;height:100%;display:flex;align-items:center;justify-content:center;border-right:1px solid var(--border);overflow:hidden;white-space:nowrap;font-size:11px;font-weight:700;color:var(--text);padding:0 4px;text-transform:capitalize}
  .gantt-week-cell{position:absolute;top:0;height:100%;display:flex;align-items:center;justify-content:center;border-right:1px solid var(--border);overflow:hidden;white-space:nowrap;font-size:9px;color:var(--muted);font-weight:500}
  .checklist-item{display:flex;align-items:center;gap:8px;padding:6px;border-bottom:1px solid var(--border)}
  .checklist-item input[type=checkbox]{width:auto;margin:0}
  .checklist-item.done span{text-decoration:line-through;color:var(--muted)}
  .level-1{padding-left:0}
  .level-2{padding-left:20px}
  .level-3{padding-left:40px}
  .level-4{padding-left:60px}

  /* ===== BAUTAGEBUCH MOBILE ===== */
  @media (max-width: 768px) {
    nav { width: 52px; }
    nav button span { display: none; }
    nav button { padding: 14px 0; justify-content: center; font-size: 20px; }
    main { padding: 12px; }
    header { padding: 6px 12px; }
    .project-select { font-size: 16px; padding: 10px 14px; }
    .diary-mobile-header { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
    .diary-mobile-header h2 { font-size: 22px; }
    .diary-mobile-header .btn { font-size: 16px; padding: 12px 20px; border-radius: 12px; width: 100%; justify-content: center; }
    .diary-card-mobile { border-radius: 14px; padding: 18px; margin-bottom: 14px; }
    .diary-card-mobile .diary-date { font-size: 18px; font-weight: 700; }
    .diary-card-mobile .diary-meta { font-size: 15px; color: var(--muted); margin-top: 4px; }
    .diary-card-mobile .diary-actions { margin-top: 12px; display: flex; gap: 8px; }
    .diary-card-mobile .btn-sm { font-size: 14px; padding: 9px 16px; }
    .diary-card-mobile .diary-type-badge { display: inline-block; padding: 3px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; margin-left: 8px; }
    .begehung-detail-fab { position: fixed; bottom: 24px; right: 24px; z-index: 50; background: var(--primary); color: #fff; border: none; border-radius: 50%; width: 60px; height: 60px; font-size: 28px; box-shadow: 0 4px 16px rgba(0,0,0,.25); cursor: pointer; display: flex; align-items: center; justify-content: center; }
  }
  @media (min-width: 769px) {
    .diary-mobile-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 10px; }
    .diary-mobile-header h2 { font-size: 24px; color: var(--primary); font-weight: 600; }
    .diary-card-mobile { border-radius: var(--radius); padding: 20px; margin-bottom: 12px; }
    .diary-card-mobile .diary-date { font-size: 16px; font-weight: 700; }
    .diary-card-mobile .diary-meta { font-size: 14px; color: var(--muted); }
    .diary-card-mobile .diary-actions { display: flex; gap: 6px; }
    .diary-card-mobile .diary-type-badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; margin-left: 8px; }
    .begehung-detail-fab { position: fixed; bottom: 28px; right: 28px; z-index: 50; background: var(--primary); color: #fff; border: none; border-radius: 50%; width: 56px; height: 56px; font-size: 26px; box-shadow: 0 4px 16px rgba(0,0,0,.2); cursor: pointer; display: flex; align-items: center; justify-content: center; }
  }
  .badge-begehung { background: #dbeafe; color: #1e40af; }
  .badge-eintrag { background: #dcfce7; color: #166534; }
  [data-theme="dark"] .badge-begehung { background: #1e3a8a; color: #bfdbfe; }
  [data-theme="dark"] .badge-eintrag { background: #14532d; color: #bbf7d0; }
  .erkenntnis-card {
    display:flex; flex-direction:row; align-items:stretch;
    min-height:130px; border:1px solid var(--border); border-radius:var(--radius);
    overflow:hidden; margin-bottom:10px; background:var(--card);
  }
  /* Linke Typ-Spalte */
  .erk-typ-col {
    width:46px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    padding:10px 0;
  }
  .erk-typ-badge-rot {
    writing-mode:vertical-lr; transform:rotate(180deg);
    padding:10px 7px; border-radius:8px;
    font-size:11px; font-weight:800; letter-spacing:1px; text-transform:uppercase; white-space:nowrap;
  }
  /* Trennlinie */
  .erk-vdivider { width:1px; background:var(--border); flex-shrink:0; margin:10px 0; }
  /* Bild-Spalte – gerahmtes Thumbnail wie ein Button */
  .erk-img-col {
    width:118px; flex-shrink:0;
    margin:8px 8px 8px 6px;
    border-radius:10px; border:1px solid var(--border);
    background:var(--surface-2);
    position:relative; overflow:hidden;
    box-shadow:0 1px 3px rgba(0,0,0,.07);
  }
  .erk-img-col img {
    position:absolute; top:0; left:0; width:100%; height:100%;
    object-fit:contain; display:block;
  }
  .erk-no-photo {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    color:#aaa; font-size:11px; text-align:center;
  }
  /* Text-Spalte */
  .erk-text-col {
    flex:1; padding:10px 12px 10px 16px; min-width:0;
    font-size:14px; line-height:1.5; color:var(--text);
    overflow-y:auto; word-break:break-word;
  }
  /* Aktions-Spalte */
  .erk-actions-col {
    width:48px; flex-shrink:0;
    display:flex; flex-direction:column; align-items:stretch;
    border-left:1px solid var(--border); overflow:hidden;
  }
  .erk-actions-col .btn { padding:9px; font-size:17px; min-width:36px; height:36px; justify-content:center; }
  .badge-mangel { background:#fee2e2; color:#991b1b; }
  .badge-info { background:#dbeafe; color:#1e40af; }
  .badge-hinweis { background:#fef9c3; color:#92400e; }
  [data-theme="dark"] .badge-mangel { background:#7f1d1d; color:#fecaca; }
  [data-theme="dark"] .badge-info { background:#1e3a8a; color:#bfdbfe; }
  [data-theme="dark"] .badge-hinweis { background:#78350f; color:#fde68a; }
  .photo-capture-area { width: 100%; min-height: 180px; background: var(--surface-2); border: 2px dashed var(--border); border-radius: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; margin-bottom: 12px; }
  .photo-capture-area img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; }
  .photo-capture-area .photo-placeholder { color: var(--muted); font-size: 14px; text-align: center; padding: 20px; }
  .photo-capture-area .photo-placeholder .cam-icon { font-size: 40px; display: block; margin-bottom: 6px; }

  /* ===== GRUPPEN-KATALOG ===== */
  .teil-layout { display:flex; gap:0; align-items:flex-start; }
  .teil-main { flex:1; min-width:0; }
  .katalog-sidebar {
    width:240px; flex-shrink:0; position:sticky; top:0;
    max-height:calc(100vh - 90px); overflow-y:auto;
    border:1px solid var(--border);
    background:var(--surface-2);
    padding:12px 10px;
    border-radius:var(--radius);
    margin-left:16px;
  }
  .katalog-item {
    padding:6px 10px; margin-bottom:4px;
    border:1px solid var(--border); border-radius:8px;
    background:var(--card); cursor:grab;
    display:flex; align-items:center; gap:6px;
    transition:background .12s, border-color .12s;
    user-select:none;
  }
  .katalog-item:hover { background:var(--info-bg); border-color:var(--primary); }
  .katalog-item.dnd-over { background:var(--nav-active-bg); border-color:var(--primary); outline:2px solid var(--primary); }
  .catalog-drop-end {
    min-height:44px; border:2px dashed var(--border);
    border-radius:var(--radius); display:flex; align-items:center;
    justify-content:center; color:var(--muted); font-size:12px;
    margin-top:8px; transition:all .15s;
  }
  .catalog-drop-end.dnd-over { border-color:var(--primary); background:var(--nav-active-bg); color:var(--primary); }

<script>
(async function(){
  await loadAll();
  applyTheme(state.settings?.theme || 'dark');
  applyHeaderMin();
  if(/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)){
    currentView = 'bautagebuch';
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.view==='bautagebuch'));
  }
  render();
  startReminderCheck();
  await offerRestoreIfEmpty();
  scheduleAutoBackup();
  const iv = state.settings.backupInterval||0;
  if(iv && (!state.settings.lastBackup || Date.now()-state.settings.lastBackup > iv)){
    runAutoBackup(false);
  }
})();
</script>
